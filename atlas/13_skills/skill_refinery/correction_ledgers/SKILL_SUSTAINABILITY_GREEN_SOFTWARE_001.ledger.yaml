hard_constraints:
- Non-production environments MUST have auto-stop outside business hours and idle detection MUST cover VMs, databases, and Kubernetes nodes [SGS-002]
- Compute MUST be right-sized to actual usage percentiles, not peak-padded defaults, with scale-to-zero where the workload allows [SGS-003]
- Data MUST have retention limits, cold data MUST move to low-energy tiers, and logs/backups/archives MUST be compressed [SGS-004]
- SCI or an equivalent carbon/energy metric MUST be tracked per service with a budget set and trended over time [SGS-005]
- CI/CD MUST use build caching and incremental builds, runners MUST scale to zero when idle, and the full suite MUST NOT run on every trivial change [SGS-008]
- Every sustainability claim MUST cite the specific SGS corpus item id and be backed by evidence, not intent
