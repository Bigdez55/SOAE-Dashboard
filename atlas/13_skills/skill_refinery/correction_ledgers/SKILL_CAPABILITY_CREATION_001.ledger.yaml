  summary: >
    The corpus marked categories FULL on skill-coverage while ATLAS had 367 skills
    and only ~6 read-only MCP tools — "we have a skill" was read as "we can do it."
    Created this skill + the capability axis + Capability Registry, and proved the
    create-the-missing-capability mandate by building the Tier-1 ATLAS write
    capabilities (git commit/push, repo file-write, knowledge-write) as real
    probe-verified tools.
