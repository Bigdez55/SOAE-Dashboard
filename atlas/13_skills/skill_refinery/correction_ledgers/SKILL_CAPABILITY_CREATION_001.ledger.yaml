tier: active
hard_constraints:
- Build real runtime-callable code; never a stub/demo/TODO.
- Capability HAVE only when probe-verified WIRED (called at runtime).
- Register every new capability as a CAP_* in capabilities/registry.yaml.
- find-before-create before building; refine weak capabilities, don't duplicate.
- Write capabilities path-confined + tenant-scoped + input-validated; remote/destructive needs explicit confirm.
immutable_facts:
- Created from MISS-002 (skill-coverage conflated with executable capability).
- A skill DESCRIBES; a tool/MCP/plugin DOES. The checklist drives capability creation.
- The maturity ladder DESCRIBED→ROUTED→EXECUTABLE→WIRED→TESTED gates HAVE at WIRED+.
