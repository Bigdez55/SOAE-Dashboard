tier: active

hard_constraints:
- Manifest V3 is used for all Chrome-family extensions; manifest_version 2 is not submitted to the Chrome Web Store.
- Requested permissions are minimal and justified; host_permissions are pinned to exact required domains, and "<all_urls>" / "*://*/*" is forbidden without a documented core-feature need.
- No secrets, API keys, or private keys are embedded in the extension bundle, and no remote code execution (eval, new Function, remote scripts) is shipped.
- Message passing validates sender id, origin, and payload schema before acting; content scripts never trust page globals.
- Content Security Policy is kept tight (no unsafe-eval, no unsafe-inline, no wildcard script-src) and the background service worker is treated as ephemeral with state persisted.
- Injected/popup/options UI fits a small viewport, is keyboard accessible, does not break host-page layout, and the user can disable or disconnect the extension cleanly.

immutable_facts:
- "Fills the Browser Extension zero-coverage gap; owned by the Production-Readiness Corpus (53_production_readiness)."
- "Corpus category id is PRC.BROWSER_EXTENSION with three sections: Manifest/Store/Permissions, Extension Security, UX/Compatibility (30 items)."
- "Manifest V3 prohibits remotely-hosted code; all executable code must ship inside the package."

