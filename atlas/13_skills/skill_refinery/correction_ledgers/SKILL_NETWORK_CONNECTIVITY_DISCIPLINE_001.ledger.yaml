skill_name: Network Connectivity Triage Discipline
skill_card_path: 13_skills/active/SKILL_NETWORK_CONNECTIVITY_DISCIPLINE_001.yaml
playbook_path: 13_skills/active/SKILL_NETWORK_CONNECTIVITY_DISCIPLINE_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- Diagnose locally before assuming an outage; run the ping-vs-TCP test first.
- ICMP-ok plus TCP-fail equals local ephemeral-port exhaustion, never a remote outage.
- Cant assign requested address equals port exhaustion; expand range or cycle link, never wait.
- Host key verification failed equals known_hosts/SSH-config; add verified port-qualified key.
- NEVER StrictHostKeyChecking no.
- Do not lower tcp.msl expecting existing TIME_WAIT to drain; Darwin pins the timer at creation.
immutable_facts:
- Promoted from 2026-05-30 fleet-push ordeal.
- macOS default ephemeral range is 49152-65535 (16384 ports); ~53k TIME_WAIT exhausts it.
- ping works during exhaustion because ICMP needs no ephemeral port; the definitive tell.
correction_history:
- date: '2026-05-30'
  type: incident_promotion
  severity: P1
  project: Development_Skills + fleet push
  summary: >
    A routine commit-and-push turned into hours of failed pushes. Two local faults
    were misdiagnosed as a network outage: ~53k stuck TIME_WAIT sockets exhausted
    the ephemeral port range (every TCP connect failed instantly with Cant assign
    requested address while ping still worked), and a port-443 SSH fallback in
    ssh config lacked the matching port-qualified known_hosts entry (Host key
    verification failed). Time was lost waiting for a non-existent outage and
    lowering tcp.msl, which does not drain existing sockets.
  fix_summary: >
    sudo sysctl -w net.inet.ip.portrange.first=16384 to add fresh ports instantly;
    appended verified bracketed github.com:443 and ssh.github.com:443 keys to
    known_hosts. Encoded the ping-vs-TCP triage order. Cross-linked from
    SKILL_GIT_REMOTE_DISCIPLINE_001 STEP 7.
regression_test_ids: []
promotion_criteria:
  to_tier: hardened
  requirements:
  - Triage correctly identifies the local cause on the next 2 connectivity incidents without waiting.
last_updated: '2026-05-30'
