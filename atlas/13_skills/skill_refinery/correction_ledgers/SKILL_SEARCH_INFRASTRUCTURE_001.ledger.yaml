tier: active
hard_constraints:
  - "Every production index has an explicit, version-controlled mapping; dynamic mapping disabled in production."
  - "All reads/writes go through a named alias, never a raw index name; reindex is a zero-downtime alias cutover with instant rollback."
  - "Analyzers/tokenizers/synonyms/stopwords are code, identical across environments; an analyzer change forces a reindex, never an in-place mutation."
  - "Relevance is protected by a golden judgment set run in CI; ranking changes must show measured nDCG/MRR/recall deltas before merge."
  - "Cluster health is alerted (unassigned shards, heap/GC, disk watermarks) and production runs replicas >= 1 with no single-node, zero-replica cluster."
  - "Search access is tenant-scoped and enforced server-side so cross-tenant reads are impossible; secrets live in a secret manager."
