hard_constraints:
  - "Velocity checks enforced server-side per identity/IP/device on signups, logins, purchases, and messages — not only at the CDN/UI."
  - "A per-action multi-signal risk score drives an allow/challenge/review/deny engine; thresholds are tunable without a code deploy and support shadow mode."
  - "Every risk decision is logged for audit/dispute, medium-risk goes to a manual review queue, and the false-positive rate is monitored."
  - "Multi-accounting/Sybil abuse is linked across device, payment, IP, and fingerprint via an identity graph; enforcement on one account applies to the ring."
  - "Scraping/enumeration is blocked with non-guessable IDs + authorization checks, per-account/per-IP data-access volume limits, and throttled bulk export."
  - "Bot defense is deployed with invisible challenges plus an accessible fallback, and confirmed fraud/chargeback data feeds back into rules and models."
immutable_facts:
  - "Fills the Fraud & Abuse Prevention zero-coverage gap; owned by the Production-Readiness Corpus (53_production_readiness)."
