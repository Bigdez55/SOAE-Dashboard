current_version: 1.0.0
tier: active

hard_constraints:
- An approved allowed/prohibited license allowlist gates all dependencies; a license scan runs on every PR and fails on prohibited or unknown licenses (PRC DEPENDENCY_LICENSE_CONTROLS.001, .002).
- Transitive licenses are scanned and copyleft (GPL/AGPL/LGPL/MPL) is reviewed and approved before inclusion in any distributed product (PRC DEPENDENCY_LICENSE_CONTROLS.003, .004).
- NOTICE/attribution files are generated and shipped, and an SBOM with per-dependency license metadata is produced for every release (PRC DEPENDENCY_LICENSE_CONTROLS.005, .011).
- Public repos include a correct LICENSE plus README, CONTRIBUTING.md, CODE_OF_CONDUCT.md, and SECURITY.md before going public (PRC OPEN_SOURCE_PROJECT_READINESS.001-005).
- Package namespaces are org-owned with MFA, and releases are published from CI with build provenance, signing, and checksums (PRC PACKAGE_PUBLISHING_AND_PROVENANCE.001-005, .010).
- Released version tags are immutable and package ownership is reviewed when a maintainer leaves the organization (PRC PACKAGE_PUBLISHING_AND_PROVENANCE.006, .011).

