- Backed by the Production-Readiness Corpus at platform/systems/53_production_readiness/ (68 categories / 3,378 items).
- Source of truth for items is corpus/source/dev-checklist-v2.jsx; everything else is generated.
- 11 categories were zero-coverage at creation; each maps to a new SKILL_* gap-filler in overlay.yaml.
