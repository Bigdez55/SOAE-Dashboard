hard_constraints:
- No item passes without evidence; HTTP 200 + green build is not done.
- Corpus item text is verbatim; never paraphrase or invent items.
- N/A must be justified by the active profile; unknown is honest, never recorded as pass.
- Every failed category links a fixing skill or raises a NO-SKILL GAP.
- The tier is computed by tools/score_audit.py; never hand-wave it.
- Declare audit scope honestly; no mass-audit theater.
