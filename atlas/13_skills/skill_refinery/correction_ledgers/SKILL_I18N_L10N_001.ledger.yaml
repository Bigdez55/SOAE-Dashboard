playbook_path: 13_skills/active/SKILL_I18N_L10N_001.playbook.md
current_version: "1.0.0"
tier: active
hard_constraints:
  - "ALWAYS externalize user-facing strings into message catalogs; NEVER hardcode UI text."
  - "ALWAYS format dates, times, numbers, and currencies via a locale-aware library (Intl/CLDR); NEVER hand-roll, and NEVER float money."
  - "ALWAYS use CLDR plural categories; NEVER gate plurals on naive n==1 logic, and NEVER concatenate sentences."
  - "ALWAYS use CSS logical properties for direction safety; ALWAYS define a locale -> region -> default fallback that never shows a raw key."
  - "ALWAYS run pseudolocalization in CI and gate releases on a per-locale translation-coverage threshold."
  - "ALWAYS make SSR and client locale resolution agree; NEVER ship a hydration locale mismatch."
immutable_facts:
  - "Fills the Internationalization & L10n zero-coverage gap; owned by the Production-Readiness Corpus (53_production_readiness)."
  - "Canonical catalog format and supported locale set must be explicitly declared and version-controlled."
