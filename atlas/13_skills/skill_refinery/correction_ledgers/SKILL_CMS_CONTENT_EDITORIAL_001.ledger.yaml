tier: active

hard_constraints:
- 'CMS choice is documented and justified (Sanity, Contentful, Strapi, WordPress, or custom); the content model is documented before authoring.'
- 'A draft, preview, approval, and publish workflow gates publishing so accidental/one-click publishing of unreviewed content is impossible.'
- Content preview renders through the exact production template/data/component path; version history and rollback are enabled and drilled for critical content.
- The content API has no anonymous/public write path; every mutation is logged with editor identity and timestamp.
- EXIF/sensitive metadata is stripped and uploads are malware-scanned before serving; images use WebP/AVIF and video has captions/transcripts.
- 'Legal review gates claims, pricing, guarantees, and regulated content; backup/export and a content-migration path are documented and tested.'

immutable_facts:
- 'Fills the Content, CMS & Editorial zero-coverage gap; owned by the Production-Readiness Corpus (53_production_readiness).'
- 'Corpus category id: PRC.CONTENT_CMS_AND_EDITORIAL, sections CMS Architecture (12 items) and Editorial Governance & Media (16 items).'
- 'This skill covers first-party editorial content and its CMS, not user-generated-content trust-and-safety moderation.'

