playbook_path: 13_skills/active/SKILL_FILE_UPLOAD_MEDIA_001.playbook.md
current_version: 1.0.0
tier: active
hard_constraints:
- File type is validated by content (magic bytes) against a MIME allowlist, never by the client-supplied extension or Content-Type header.
- Filenames are sanitized and never used as a storage key; every upload gets a server-generated random opaque key to prevent path traversal.
- Uploaded files are stored outside the web root or in object storage with private ACLs and served only via scoped, short-lived presigned/signed URLs.
- Every uploaded file is malware-scanned and quarantined until the scan completes; scan failures fail closed (file not served) with alerting.
- Media processing runs asynchronously in idempotent, retryable jobs with dead-letter handling and bomb/timeout limits; never shell out with an unsanitized filename.
- Upload endpoints are authenticated with per-user/per-tenant rate limits and quotas, and import-from-URL destinations are allowlisted to prevent SSRF.
