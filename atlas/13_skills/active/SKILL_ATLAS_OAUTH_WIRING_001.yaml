id: SKILL_ATLAS_OAUTH_WIRING_001
title: GitHub OAuth Wiring for the ATLAS Web Service (Next.js)
version: 1.1.0
layer: application
domains:
- frontend
- auth
- security
- web
- desktop
playbook: 13_skills/active/SKILL_ATLAS_OAUTH_WIRING_001.playbook.md
ledger: 13_skills/skill_refinery/correction_ledgers/SKILL_ATLAS_OAUTH_WIRING_001.ledger.yaml
status: active
tier: active
source: incident_promotion
runtime_projection: true
runtime_projection_targets:
- claude
- codex
- gemini

trigger_conditions:
- The ATLAS web service (Next.js, served at http://127.0.0.1:4317) requires OAuth authentication (GitHub, Google, or other).
- Existing "bearer token" or "local-loopback" auth model needs replacement.
- App must run both as the always-on hosted web service and (LEGACY) a packaged desktop shell from the same codebase.

hard_constraints:
- OAuth callback URL MUST use the 127.0.0.1 loopback host (per RFC 8252) — canonical for the web service at :4317 and reused by the LEGACY desktop shell — not custom URL schemes.
- Session JWT MUST be signed with jose (Edge-Runtime compatible), NOT Auth.js v5 (Next 16 compat unverified).
- Session cookie MUST be HttpOnly + Secure + SameSite=Strict; never persist tokens in localStorage.
- Refresh tokens MUST be stored in OS keychain (macOS Keychain via keytar, Windows Credential Manager, Linux Secret Service).
- All 8 required session claims (sub, tenant_id, session_id, roles, permissions, repo_scopes, issued_at, expires_at) MUST be present.
- CSP MUST allow github.com on form-action and connect-src; MUST NOT use 'unsafe-inline' in script-src.
- Local-identity fallback MUST be available when OAuth credentials are absent (for desktop dev mode without registered OAuth app).
- ATLAS_AUTH_ENABLED=0 env flag MUST bypass auth with stub claims (for smoke tests only).

known_failure_modes:
- Misnaming the proxy/middleware file (Next 15 used middleware.ts; Next 16 reverted to proxy.ts) — all API routes serve unauthenticated.
- Named export of proxy function instead of default export — Next.js does not invoke it; routes are wide open.
- Bearer token comparison with === instead of crypto.timingSafeEqual — timing attack vulnerability.
- Accepting tenantId from POST body without cross-checking session claims — IDOR bypass.
- Inline-script CSP fallback ('unsafe-inline' in script-src) — nullifies XSS protection.
- ATLAS_API_TOKEN env-var-based gating with silent fail (unset = auth disabled) — production deploy without token = wide open.

validation_tests:
- Smoke test with ATLAS_AUTH_ENABLED=0 — middleware passes through with stub claims.
- Mint+verify JWT roundtrip with each required claim.
- Reject expired JWT.
- Verify cookie attributes (HttpOnly, Secure, SameSite=Strict).
- E2E: /api/auth/github redirects to GitHub authorization URL with PKCE state.
- E2E: callback exchanges code, mints JWT, sets cookie, redirects to /.
- E2E: forge x-atlas-tenant-id header with mismatched session JWT → 403 byte-identical to "not found" response.
- Local-identity fallback creates ~/.atlas/identity.json on first launch.

improvement_history:
- version: 1.0.0
  date: '2026-05-29'
  reason: >
    Promoted from ATLAS production readiness audit. P0 incident: src/proxy.ts was
    misnamed (Next 15 expected middleware.ts) AND misexported (named function not
    default) — all 13 API routes served unauthenticated at runtime despite
    production-readiness.ts claiming "Loopback-or-bearer proxy exists for local
    API protection only". jose + GitHub OAuth + Keychain refresh tokens + local-identity
    fallback pattern is now the canonical reference for all Next.js + Electron apps.
- version: 1.1.0
  date: '2026-06-03'
  reason: >
    Reframed off the Electron-first framing toward the always-on web service. The
    canonical OAuth target is the ATLAS web service (Next.js) at http://127.0.0.1:4317;
    the 127.0.0.1 loopback callback (RFC 8252) is canonical for the web service and
    merely reused by the LEGACY desktop shell. Updated callback/homepage URLs from the
    old dev port (3100) to :4317. Declared runtime_projection: true (claude/codex/gemini)
    so this auth-wiring skill projects into runtime.

