playbook: platform/sdlc/13_skills/active/SKILL_CMS_CONTENT_EDITORIAL_001.playbook.md
ledger: platform/sdlc/13_skills/skill_refinery/correction_ledgers/SKILL_CMS_CONTENT_EDITORIAL_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
- claude
