id: SKILL_CMS_CONTENT_EDITORIAL_001
name: Content, CMS and Editorial
title: Content, CMS and Editorial Production Readiness
purpose: >
  Make a content platform production-ready: a justified, modeled, access-controlled
  CMS with draft/preview/approval/publish workflow, versioning and rollback, plus
  editorial governance (style, legal, accessibility, localization) and safe media
  handling (EXIF stripping, malware scan, modern formats, captions). Fills the
  "Content, CMS & Editorial" zero-coverage gap in the Production-Readiness Corpus.
version: 1.0.0
layer: content
domains:
- content_management
- editorial_governance
- digital_asset_management
- accessibility
- seo
- localization
tier: active
status: active
source: native
aliases:
