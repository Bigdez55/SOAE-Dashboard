id: SKILL_PRODUCTION_READINESS_AUDIT_001
name: Production Readiness Audit
title: Production-Readiness Audit
purpose: >
  Run a scoped, scored, evidence-backed production-readiness audit of any project
  against the canonical Production-Readiness Corpus (68 categories / 3,378 items).
  Surfaces gaps, links the skill that fixes each gap (or flags NO-SKILL GAP), and
  computes a Bronze/Silver/Gold/Platinum tier. Works for our own repos and for
  consulting / infrastructure assessments in any domain or industry.
version: 1.1.0
layer: verification
domains:
- production_readiness
- audit
- verification
- governance
- consulting
tier: active
status: active
source: native
aliases:
- production-readiness-audit
- platinum-audit
- prc-audit
- production_audit
playbook: platform/sdlc/13_skills/active/SKILL_PRODUCTION_READINESS_AUDIT_001.playbook.md
ledger: platform/sdlc/13_skills/skill_refinery/correction_ledgers/SKILL_PRODUCTION_READINESS_AUDIT_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
- claude
- codex
- gemini
slash_commands:
- /apex:production_audit
router_intents:
- production_readiness_audit
- platinum_audit

corpus:
  root: platform/systems/53_production_readiness
  taxonomy: platform/systems/53_production_readiness/corpus/taxonomy.yaml
  categories_dir: platform/systems/53_production_readiness/corpus/categories
  machine: platform/systems/53_production_readiness/generated/corpus.json
  rubric: platform/systems/53_production_readiness/rubric/scoring_rubric.yaml
  scorer: platform/systems/53_production_readiness/tools/score_audit.py
  profiles_dir: platform/systems/30_repo_starter/repo_blueprints
  overlays_dir: platform/systems/53_production_readiness/profiles/industry_overlays
  runs_dir: platform/systems/23_evidence/production_readiness_runs

trigger_conditions:
- The user asks whether a project or repo is production ready, platinum grade, or fully built.
- The user asks to audit a system against the checklist, corpus, or standards.
- The user asks to find gaps, what is left, or what is missing before launch.
- A consulting or infrastructure assessment of a client stack is requested.
- The user asks for a completion percentage, scope, or milestone status for a project.

hard_constraints:
- No item is marked pass without evidence (a path, a command and its result, or a cited artifact).
- HTTP 200 and a green build is NOT done. Verify the rendered surface or real behavior first (see SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001).
- Corpus item text is verbatim. Never paraphrase, summarize, or invent items.
- N/A must be justified by the active profile. Never silently skip a category.
- unknown is an honest verdict for an un-audited item. Never record un-audited items as pass.
- Every failed category links a fixing skill OR raises a NO-SKILL GAP.
- The tier is computed by tools/score_audit.py from an audit_state.yaml. Never hand-wave a tier.
- Declare the audit scope honestly. Do not fabricate item-level verdicts at scale (mass-audit theater).

known_failure_modes:
- Mass-audit theater — presenting thousands of unverified verdicts as a real audit.
- Marking a category pass on build success alone without behavioral verification.
- Paraphrasing corpus items, drifting away from the source of truth.
- Skipping inapplicable categories without recording N/A plus a reason.
- Reporting a tier not produced by the deterministic scorer.
- Conflating skill-coverage (a skill DESCRIBES) with capability (a tool/MCP DOES). A category can be skill-coverage FULL yet capability MISSING — grade both axes. capability HAVE requires probe-verified WIRED (see SKILL_DEFINITION_OF_DONE_GATE_001 + SKILL_CAPABILITY_CREATION_001).

validation_tests:
- tools/score_audit.py reproduces the same tier from a given audit_state.yaml (deterministic).
- A gap_report.yaml and summary.md are produced for the target under runs_dir.
- Every NONE-coverage category in scope shows a NO-SKILL GAP with a fix skill.
- audit_state.yaml verdict ids resolve to real corpus item ids (no orphan verdicts).

improvement_history:
- version: 1.0.0
  date: '2026-05-31'
  reason: >
    Created to operationalize the Production-Readiness Corpus (68 categories /
    3,378 items, generated from the source-of-truth dev-checklist-v2.jsx). Turns the
    hand-authored Platinum Dev Checklist into a scoped, scored, evidence-backed audit
    usable on any project and any consulting domain. Composes audit-assess-analyze
    (forensic rigor) + existing-repo-audit (truth map) + proof-matrix (evidence).
- version: 1.1.0
  date: '2026-06-02'
  reason: >
    Refined for the capability axis + enforced Definition-of-Done. The corpus now
    grades TWO axes — skill-coverage (knowledge) AND capability_status (execution:
    HAVE/PARTIAL/MISSING, HAVE requires probe-verified WIRED). Verdicts are produced
    by evidence probes (probe_runner.py), not agent self-report; the release state is
    derived (derive_gate_state.py) and gated at pre-commit + CI. Composes the new
    SKILL_DEFINITION_OF_DONE_GATE_001 (enforcement) + SKILL_CAPABILITY_CREATION_001
    (build the missing tool/MCP/plugin). Use the capability axis to answer "can we
    actually DO it", not just "do we have a write-up".

