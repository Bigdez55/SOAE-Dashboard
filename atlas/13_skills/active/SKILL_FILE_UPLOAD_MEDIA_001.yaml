trigger_conditions:
- Adding or changing an endpoint that accepts file uploads or multipart form data.
- Wiring object storage (S3, GCS, Azure Blob, R2) or presigned URLs for user files.
- Building image, video, audio, or document transcoding or thumbnailing pipelines.
- Implementing avatar, attachment, import, or document-upload features.
- Generating or serving download, preview, or CDN URLs for user-supplied media.
- Adding a "fetch file from URL" or remote-import upload feature.
- Auditing an existing upload or media path for production readiness.
hard_constraints:
- File size limits are enforced server-side (edge proxy AND application handler), never only client-side, and the body is streamed rather than fully buffered into memory.
- File type is validated by content (magic bytes), not by the client-supplied extension or Content-Type header, against an explicit MIME allowlist (never a blocklist).
- Filenames are sanitized and never used as a storage path or key; every upload gets a server-generated random opaque key to prevent path traversal and injection.
- Uploaded files are stored outside the web root or in object storage with private ACLs; private media is served only via scoped, short-lived presigned/signed URLs.
- Files are served with safe Content-Type and Content-Disposition headers; SVG/HTML uploads are sanitized or served as attachments so a stored payload cannot execute as script (no stored XSS).
- Executable and script uploads are blocked or neutralized, and image/document parsing is hardened against malicious payloads including decompression bombs and nested-archive limits.
- Every uploaded file is malware-scanned (ClamAV, vendor AV, or cloud scanning) and quarantined until the scan completes; scan failures fail closed (file not served) with alerting and auditable logs.
- Polyglot files (valid as multiple types) are detected and rejected, and EXIF/sensitive metadata is stripped from public images before serving.
- PDF and Office documents are scanned for active content/macros, and a defined quarantine and remediation workflow plus re-scan capability exists for signature updates.
- Upload endpoints are authenticated and authorized, with per-user/per-tenant upload rate limiting and storage quotas enforced.
- Media processing (resize, transcode, thumbnail) runs asynchronously off the request path in idempotent, retryable jobs with dead-letter handling, alerting, and large-file/long-running transcode timeouts.
- Originals are retained or re-derivable and derivatives are regenerable; public media is delivered via CDN with range-request streaming for large files.
- Import-from-URL destinations are validated and allowlisted, blocking private/internal/metadata IP ranges to prevent SSRF.
- Storage credentials and URL-signing keys are loaded from a secret manager or environment (never hardcoded); media deletion propagates to CDN and all replicas, and orphaned/obsolete files are cleaned up via lifecycle policies.
known_failure_modes:
- Trusting client-supplied Content-Type or extension instead of magic bytes, allowing content-type spoofing and script upload.
- Storing files under the client-supplied filename, enabling path traversal writes or overwrite of existing objects.
- Serving user uploads (SVG/HTML) from the app origin so a stored payload executes script (stored XSS).
- Decompression or pixel-flood bombs (zip bombs, hostile image dimensions, nested archives) exhausting memory or CPU.
- Polyglot files that pass a single-type check while remaining a valid script or archive.
- SSRF and internal-network/metadata access through import-from-URL features fetching attacker-controlled endpoints.
- Buffering the entire upload into memory before applying the size limit, enabling memory-exhaustion DoS.
- Non-idempotent transcode jobs producing duplicate or corrupt derivatives on retries, or scan failures failing open and serving unscanned files.
validation_tests:
- An upload exceeding the configured max size is rejected server-side before being fully buffered into memory.
- A file with a .png extension whose magic bytes are not PNG (e.g. a script or PHP payload) is rejected by content sniffing against the MIME allowlist.
- An SVG or HTML upload is sanitized, rejected, or served only with Content-Disposition attachment and safe headers so it cannot execute script.
- A client-supplied filename containing ../ or absolute paths cannot influence the server-side storage key.
- A presigned/signed download URL is scoped and expires; a replayed URL after its TTL is denied.
- A crafted decompression or pixel-flood file is bounded by dimension, archive-depth, and resource/timeout limits rather than crashing the worker; an unscanned/quarantined file is never served (fail closed).
- Re-running the same media-processing job (same input + idempotency key) produces no duplicate or corrupt derivatives, and failures route to a dead-letter queue with alerting.
- Upload, scan, and transcode log lines share a correlation ID traceable across the pipeline, and a deleted file is purged from object storage, CDN, and replicas.
