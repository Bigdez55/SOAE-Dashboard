id: SKILL_FILE_UPLOAD_MEDIA_001
name: File Upload and Media Processing
title: File Upload and Media Processing
purpose: 'Make user-supplied file uploads and downstream media processing safe and resilient for production: enforce server-side size/type/quota limits, validate by content not extension, neutralize malicious and polyglot payloads, scan for malware, store privately, and transcode in idempotent, autoscaling pipelines. Owns the "File Upload & Media Processing" Production-Readiness Corpus category.'
