id: SKILL_SEARCH_INFRASTRUCTURE_001
name: Search Infrastructure
title: "Search Infrastructure: Production-Ready Indexing, Relevance, and Query Serving"
purpose: |
  Make full-text, faceted, and vector search production-ready: durable indexing
  pipelines, reproducible relevance, bounded query latency, healthy clusters, and
  secure tenant-scoped access. Teaches how to satisfy the "Search Infrastructure"
  production-readiness corpus category that previously had zero dedicated coverage.
version: 1.0.0
layer: data
domains:
  - search
  - data-infrastructure
  - relevance-engineering
  - observability
  - reliability
  - security
tier: active
status: active
source: native
aliases:
  - search-infrastructure
  - full-text-search
  - elasticsearch-opensearch
  - vector-search
  - search-relevance
  - query-latency
playbook: platform/sdlc/13_skills/active/SKILL_SEARCH_INFRASTRUCTURE_001.playbook.md
ledger: platform/sdlc/13_skills/skill_refinery/correction_ledgers/SKILL_SEARCH_INFRASTRUCTURE_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
  - claude
  - codex
  - gemini
corpus_category: "Search Infrastructure"
trigger_conditions:
  - "A search engine (Elasticsearch, OpenSearch, Algolia, Typesense, Meilisearch, pgvector, or a vector DB) is being introduced, scaled, or hardened for production."
  - "Index mappings, analyzers, tokenizers, or synonym/stopword sets are being defined or changed."
  - "A reindex, schema migration, or zero-downtime index swap (alias cutover) is planned."
  - "Search relevance, ranking, boosting, or vector similarity behavior must be tuned, measured, or regression-tested."
  - "Query latency, throughput, or cluster health (shard balance, heap, disk watermarks) is degrading or being SLO-bounded."
  - "Search must be made multi-tenant and access-controlled so one tenant cannot read another's documents."
  - "A production-readiness audit reaches the \"Search Infrastructure\" corpus category."
  - "Search results are stale, empty, duplicated, or inconsistent with the system of record."
hard_constraints:
  - "Every index has an explicit, version-controlled mapping/schema; dynamic mapping is disabled or pinned in production (no uncontrolled field explosion)."
  - "All reads and writes go through a named alias, never a raw index name, so reindexing is a zero-downtime alias cutover with instant rollback."
  - "Reindexing is reproducible from the system of record: a documented, idempotent, resumable backfill exists and is rehearsed in staging before production."
  - "Analyzers, tokenizers, synonyms, and stopwords are declared as code and identical across all environments; analyzer changes force a reindex, never an in-place mutation."
  - "Query latency has an enforced SLO (e.g. p95 and p99 ceilings) with dashboards and alerts; slow-query logging is enabled and reviewed."
  - "Relevance is protected by a golden query/judgment set run in CI; ranking changes must show measured nDCG/MRR/recall deltas before merge — no blind boosting."
  - "Cluster health is monitored and alerted: shard allocation, unassigned shards, JVM heap pressure, GC pauses, and disk watermarks (low/high/flood-stage)."
  - "Shard and replica counts are sized intentionally (shard size target ~10-50GB, replicas >= 1 in production); no single-node, zero-replica production cluster."
  - "Indexing is decoupled from the request path via a durable queue/stream; ingest failures are retried with a dead-letter path, never silently dropped."
  - "Search access is tenant-scoped and authenticated: per-tenant filtering (or document-level security) is enforced server-side so cross-tenant reads are impossible."
  - "Secrets (cluster credentials, API keys) are stored in a secret manager, never in source, env files committed to VCS, or client-side bundles."
  - "Snapshots/backups of indices run on a schedule to durable storage, and restore is tested; index data is treated as rebuildable but recovery is still rehearsed."
  - "Bulk/ingest and query traffic are rate-limited and circuit-broken so a runaway reindex or query storm cannot take down the cluster."
  - "PII and sensitive fields in indexed documents are classified; field-level redaction/encryption and retention/deletion (right-to-be-forgotten) paths exist."
known_failure_modes:
  - "Dynamic mapping enabled in production: an unexpected field shape triggers a mapping explosion or type conflict and rejects all subsequent writes to the index."
  - "Reindex done in place against the live index name with no alias, causing a hard outage and no rollback path during cutover."
  - "Analyzer/synonym change applied without reindex, so old documents keep the old tokenization and relevance silently splits across two regimes."
  - "Relevance regression shipped because ranking was tuned by eyeballing a few queries with no golden judgment set, degrading aggregate nDCG."
  - "Cluster goes red after a node loss because production ran with zero replicas or oversized shards; recovery is slow or impossible."
  - "Disk hits the flood-stage watermark and Elasticsearch/OpenSearch flips indices to read-only, silently failing all writes."
  - "Cross-tenant data leak: filtering was done client-side or omitted, so a crafted query returns another tenant's documents."
  - "Indexing coupled to the synchronous request path: an ingest spike or cluster slowdown cascades into user-facing request timeouts."
validation_tests:
  - "Confirm every production index is fronted by an alias and that no application code references a raw, dated index name (grep/config audit)."
  - "Run the reindex/backfill in staging end-to-end, kill it midway, resume it, and assert document counts match the system of record exactly."
  - "Execute the golden-query relevance suite and assert nDCG/MRR/recall meet thresholds; fail CI on regression beyond tolerance."
  - "Load-test query traffic and assert measured p95/p99 latency stays within the declared SLO; verify slow-query log captures offenders."
  - "Force a node-down / shard-reallocation scenario in a test cluster and confirm the cluster returns to green with no data loss (replicas >= 1)."
  - "Attempt a cross-tenant query as tenant A for tenant B's data and assert zero documents are returned (server-side enforcement test)."
  - "Trigger the high/flood-stage disk watermark in a test cluster and confirm alerting fires before indices go read-only."
  - "Take a snapshot, restore it into a clean cluster, and verify document counts and a sample of queries match the source."
improvement_history:
