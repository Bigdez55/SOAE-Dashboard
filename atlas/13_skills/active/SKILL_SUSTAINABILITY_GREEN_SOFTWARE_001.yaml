id: SKILL_SUSTAINABILITY_GREEN_SOFTWARE_001
name: sustainability-green-software
title: Sustainability and Green Software
purpose: |
  Engineer software and infrastructure for energy efficiency, carbon-aware
  computing, and minimal environmental footprint. Operationalizes the
  Sustainability & Green Software production-readiness corpus so carbon and
  energy impact are measured, budgeted, and reduced as first-class concerns.
version: 1.0.0
layer: operations
domains:
- sustainability
- green-software
- carbon-aware-computing
- cloud-efficiency
- finops
- operational-excellence
tier: active
status: active
source: native
aliases:
- sustainability-green-software
- green-software
- carbon-aware-computing
- green-ops
- sustainable-engineering
- energy-efficiency
playbook: platform/sdlc/13_skills/active/SKILL_SUSTAINABILITY_GREEN_SOFTWARE_001.playbook.md
ledger: platform/sdlc/13_skills/skill_refinery/correction_ledgers/SKILL_SUSTAINABILITY_GREEN_SOFTWARE_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
- claude
- codex
- gemini
corpus_category: "Sustainability & Green Software"
trigger_conditions:
- User asks about energy efficiency, carbon footprint, or green/sustainable software
- A workload or architecture review must account for carbon or energy impact
- Idle, orphaned, or over-provisioned cloud resources are suspected of wasting energy
- Batch/cron/deferrable jobs are being scheduled and grid carbon intensity matters
- A cost/FinOps review surfaces waste that overlaps with energy and carbon waste
- Storage retention, tiering, or data-lifecycle decisions are being made
- The Sustainability & Green Software corpus category is referenced or audited
- CI/CD pipeline energy waste (always-on runners, redundant builds) is in scope
hard_constraints:
- Deferrable batch and cron jobs MUST be classified as deferrable vs time-critical, and deferrable work SHOULD be scheduled into low-carbon grid windows using a carbon-intensity signal (WattTime, Electricity Maps) [SGS-001]
- Region selection for new workloads MUST consider grid carbon intensity and renewable commitments, not latency and cost alone [SGS-001, SGS-009]
- Non-production environments MUST have auto-stop policies outside business hours, and idle detection MUST cover VMs, databases, and Kubernetes nodes [SGS-002]
- An orphaned-resource sweeper MUST run on a schedule to reclaim unattached disks, idle load balancers, and abandoned environments [SGS-002]
- Compute MUST be right-sized to actual usage percentiles; requests/limits MUST NOT be left at peak-padded or default headroom, and autoscaling SHOULD scale to zero where the workload allows [SGS-003]
- Data MUST have retention limits that delete it past its useful life, cold data MUST move to low-energy storage tiers, and logs/backups/archives MUST be compressed [SGS-004]
- Software Carbon Intensity (SCI) or an equivalent energy/carbon metric MUST be tracked per service, and a carbon/energy budget MUST be set and trended over time [SGS-005]
- Cloud provider carbon dashboards MUST be reviewed on a defined cadence and the result recorded [SGS-005]
- Bursty or low-utilization workloads SHOULD prefer serverless/managed/multi-tenant platforms over idle dedicated fleets, and bin-packing MUST be used to raise hardware utilization [SGS-006]
- Hot paths MUST be profiled and optimized for CPU/memory efficiency, caching MUST eliminate redundant computation and network calls, and efficient (compressed/binary) data formats MUST be used on high-volume paths [SGS-007]
- CI/CD MUST use build caching and incremental/affected-only builds, CI runners MUST scale to zero when idle, and the full test suite MUST NOT run on every trivial change [SGS-008]
- Hardware/device refresh cycles SHOULD be extended where feasible, and decommissioned hardware MUST be reused or recycled responsibly to limit embodied carbon [SGS-009]
- Sustainability MUST be an explicit item in architecture/design reviews and in vendor/technology selection, with team green-software guidelines in place [SGS-010]
- Every sustainability claim or verdict MUST cite the specific SGS corpus item id it satisfies and MUST be backed by evidence (metric, config, command output, or dashboard), not intent
known_failure_modes:
- Treating "the build is green" as evidence of green software while ignoring idle and over-provisioned compute
- Optimizing only for cost and latency and never measuring carbon, so impact is invisible (cannot manage what you do not measure)
- Selecting a cloud region purely on price/latency and silently picking a high-carbon grid
- Setting retention to "keep everything" so cold data accumulates on hot, high-energy tiers
- Leaving non-prod environments and CI runners running 24/7 when they are used only during business hours
- Padding CPU/memory requests "to be safe" so clusters run chronically over-provisioned
- Claiming serverless/managed is greener without bin-packing or utilization evidence to support it
- Listing sustainability as a value but never gating it in a design review or vendor decision
validation_tests:
- Deferrable jobs are labeled deferrable vs time-critical and a carbon-intensity signal is wired into at least one scheduler (cite SGS-001)
- Non-prod auto-stop and an orphaned-resource sweeper are configured and have reclaimed resources on a recent run (cite SGS-002)
- Right-sizing recommendations are applied and requests/limits track measured usage percentiles; at least one workload scales to zero (cite SGS-003)
- Retention limits, tiering policy, and compression for logs/backups/archives are in place and enforced (cite SGS-004)
- An SCI or equivalent per-service carbon/energy metric exists, a budget is set, and a trend is shown over time (cite SGS-005, SGS-008)
- Hot paths show profiled before/after efficiency gains and caching demonstrably cuts redundant compute or network calls (cite SGS-007)
- CI shows cache hit rate, incremental/affected-only builds, and runners that scale to zero when idle (cite SGS-008)
- A recent architecture/design review or vendor decision record contains an explicit sustainability/carbon consideration (cite SGS-010)
