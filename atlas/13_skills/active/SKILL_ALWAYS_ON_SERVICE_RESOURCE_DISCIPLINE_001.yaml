id: SKILL_ALWAYS_ON_SERVICE_RESOURCE_DISCIPLINE_001
name: Always-On Service Resource Discipline
version: 1.0.0
status: active
purpose: '** Any process registered to run unattended (launchd/systemd/pm2/Docker
  restart/KeepAlive) MUST be bounded so a failure degrades gracefully instead of cascading
  into a machine-wide resource runaway. Five guardrails (throttle, memory cap, orphan
  reap, single-instance/opt-in, idempotent boot) + an operator OFF switch + leave-no-runaway
  mindfulness. Triggers: "always on", "keep alive", "ran out of memory overnight",
  "100 processes open", "Node/Python piling up", launchd Status -9, before leaving
  an agent in auto/unattended mode.'
inputs:
- service definition (plist/unit/restart policy/loop)
- process census
- entrypoint/runner script
outputs:
- bounded service definition (throttle + memory cap + orphan reap)
- operator enable/disable/reap/status controls
- flat-census stability verification
known_failure_modes:
- KeepAlive/restart with no throttle, no memory cap, no orphan reap
- known-degraded daemon left on KeepAlive (crash-loops forever, unattended)
- child orphaned on uncatchable SIGKILL/jetsam squats the port
- heavy work (asset copy / full re-scan) on every boot of a crash-looping service
- declaring done on green build without verifying a flat machine process census
validation_tests: []
improvement_history:
- version: 1.0.0
  reason: Initial authoring. Anchor — ATLAS overnight 100+ Node/Python process pile-up
    (2026-06-03); three KeepAlive launchd agents with ThrottleInterval=10, no memory
    cap, orphaned next-server children, and a crash-looping legacy Python bookworm daemon
    exhausted 16 GB RAM unattended. Fix codified as five guardrails + operator authority.
title: Always-On Service Resource Discipline
layer: infrastructure
domains:
- infrastructure
- reliability
- ops
