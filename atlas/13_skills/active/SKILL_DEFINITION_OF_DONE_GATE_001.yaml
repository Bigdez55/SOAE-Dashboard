id: SKILL_DEFINITION_OF_DONE_GATE_001
name: Definition of Done Gate
title: Enforced Definition-of-Done Gate (probes write verdicts, not the agent)
purpose: >
  Kill false-completion at the root: completion is decided by EVIDENCE PROBES
  (scripts that inspect real state), never self-reported by the agent. A
  completion claim (done/proven/ready) is valid only if its backing probes pass.
  Enforced at pre-commit (local block) and CI (the non-bypassable floor); the
  release recommendation is DERIVED from probe output, never hand-typed.
version: 1.0.0
layer: verification
domains:
- verification
- governance
- definition_of_done
- anti_false_completion
tier: active
status: active
source: native
aliases:
- definition-of-done-gate
- dod-gate
- probes-write-verdicts
playbook: platform/sdlc/13_skills/active/SKILL_DEFINITION_OF_DONE_GATE_001.playbook.md
ledger: platform/sdlc/13_skills/skill_refinery/correction_ledgers/SKILL_DEFINITION_OF_DONE_GATE_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
- claude
- codex
- gemini
router_intents:
- definition_of_done
- completion_gate

system_components:
  probes: platform/systems/53_production_readiness/probes/probe_runner.py
  derive: infrastructure/scripts/production_readiness/derive_gate_state.py
  claim_guard: infrastructure/scripts/production_readiness/completion_claim_guard.py
  pre_commit_hook: .git/hooks/pre-commit
  ci_job: .github/workflows/atlas-release-gate.yml (dod-gate)
  miss_log: platform/systems/53_production_readiness/ATLAS_MISS_LOG.md
  capability_registry: platform/systems/53_production_readiness/capabilities/registry.yaml

trigger_conditions:
- About to claim work is done / wired / complete / production-ready / proven.
- Writing or editing a file that asserts release readiness or a gate as proven.
- Setting up completion enforcement for a project or build.
- A false-completion claim was caught and must be prevented from recurring.
- Asked whether a project is finished or ready to ship.

hard_constraints:
- A completion verdict is produced by a probe (a script that inspects real state), never by agent assertion.
- A probe that cannot determine state returns unknown — and unknown is treated as NOT pass everywhere.
- Release/readiness state in code is DERIVED from probe output; hand-typing a release claim is forbidden and blocked by --check.
- A staged file asserting done/proven/ready must have its backing probes pass, or the commit is blocked.
- Pre-commit is bypassable with --no-verify (logged); CI is the real non-bypassable floor — say so honestly.
- Probes are unit-tested against a known-bad oracle; a lenient probe (passes on a broken state) is itself a bug.
- HTTP 200 + green build is NOT done; verify real behavior/runtime (composes SKILL_UI_LIVE_VERIFICATION_BEFORE_DONE_001 and SKILL_WIRED_NOT_DEFINED_001).
- A caught miss is logged to the fleet miss log with a regression probe that must pass before a future done in that domain.

known_failure_modes:
- Agent self-declares done; nothing checks it (the root hole this skill closes).
- Hand-typed release state (releaseRecommendation) disagrees with reality; CI asserts the lie.
- Lenient probe relocates the false-positive into trusted automation (worse — now believed).
- unknown/unassessed silently treated as pass (empty-bucket bug).
- Pre-commit bypassed with --no-verify and no CI floor behind it.

validation_tests:
- probe_runner.py --self-test passes (probes report the known-bad state as fail).
- A deliberately-false done commit is rejected (git exit 1) by the pre-commit claim guard.
- derive_gate_state.py --check fails when production-readiness.ts disagrees with probes; passes when derived.
- CI dod-gate job runs the probe suite + corpus check + derive --check + score selfcheck.

improvement_history:
- version: 1.0.0
  date: '2026-06-01'
  reason: >
    Created from the 2026-06-01 false-completion incident (MISS-001): ATLAS was
    graded/declared production-ready while it was a read-only demo. Encodes
    probes-write-verdicts, derived release state, pre-commit claim-guard, CI floor,
    and the miss-log force-regression loop. Composes audit, wired-not-defined,
    architecture-honesty, ui-live-verification, and proof-matrix.

