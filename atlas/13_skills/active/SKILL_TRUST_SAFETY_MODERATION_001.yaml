id: SKILL_TRUST_SAFETY_MODERATION_001
name: Trust and Safety / Content Moderation
title: "Trust & Safety / Content Moderation"
purpose: >
  Design, build, and audit the trust-and-safety stack for any platform that hosts
  user-generated content: the moderation pipeline, illegal-content / CSAM handling,
  abuse-harassment-spam defenses, reporting and appeals, and T&S operations and
  transparency. Satisfies the hand-authored Production-Readiness Corpus category
  "Trust & Safety / Content Moderation" (53_production_readiness), which previously
  had zero dedicated skill coverage.
version: 1.0.0
layer: governance
domains:
- trust_and_safety
- content_moderation
- abuse_prevention
- governance
- compliance
tier: active
status: active
source: native
aliases:
- trust-and-safety
- content-moderation
- t-and-s
- csam-handling
- abuse-and-harassment
- moderation-pipeline
playbook: platform/sdlc/13_skills/active/SKILL_TRUST_SAFETY_MODERATION_001.playbook.md
ledger: platform/sdlc/13_skills/skill_refinery/correction_ledgers/SKILL_TRUST_SAFETY_MODERATION_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
- claude
- codex
- gemini
corpus_category: "Trust & Safety / Content Moderation"

trigger_conditions:
- The platform accepts or displays any user-generated content (posts, comments, media, profiles, reviews, chat).
- The platform allows users to upload images, video, or audio.
- A trust-and-safety, content-policy, or community-guidelines review is requested.
- Reporting, flagging, appeals, or enforcement (warning / removal / suspension / ban) flows are being designed.
- The platform operates in the EU (DSA notice-and-action, appeals, trusted flaggers) or hosts users where minors may be present.
- Real-time content (livestreams, chat, comments) needs a moderation path.
- A transparency report, government-takedown log, or moderation-metrics dashboard is needed.

hard_constraints:
- "A content policy (community guidelines / acceptable use) MUST be defined and published before user-generated content goes live (PRC.CONTENT_MODERATION_PIPELINE.001)."
- "A moderation strategy MUST be explicitly chosen (pre-moderation, post-moderation, reactive, or hybrid) and a human-review queue MUST exist for borderline and appealed content (PRC.CONTENT_MODERATION_PIPELINE.002, .004)."
- "Any platform hosting user-uploaded media MUST integrate CSAM detection (PhotoDNA, Google CSAI Match, or Thorn Safer); this is a legal blocker and is never waived (PRC.ILLEGAL_CONTENT_AND_CSAM.001)."
- "A NCMEC CyberTipline reporting process MUST be established for US operation, and detected CSAM MUST be preserved per legal requirement with tightly restricted access and authorities notified (PRC.ILLEGAL_CONTENT_AND_CSAM.002, .004)."
- "Staff who handle CSAM or harmful content MUST have trauma/wellness support and strict access controls (PRC.ILLEGAL_CONTENT_AND_CSAM.005, PRC.T_AND_S_OPERATIONS_AND_TRANSPARENCY.003)."
- "An EU Digital Services Act notice-and-action process for illegal content MUST exist, with a legal escalation path that is defined and tested (PRC.ILLEGAL_CONTENT_AND_CSAM.009, .010)."
- "Self-harm and suicide content detection MUST surface crisis resources rather than only removing the content (PRC.ABUSE_HARASSMENT_AND_SPAM.004)."
- "An in-product reporting flow MUST be available for every content type, with report categories aligned to the published policy (PRC.REPORTING_APPEALS_AND_ENFORCEMENT.001, .002)."
- "Enforcement MUST be tiered (warning, content removal, feature limit, suspension, ban) and every enforcement decision MUST be logged immutably with rationale (PRC.REPORTING_APPEALS_AND_ENFORCEMENT.004, .008)."
- "An appeals process MUST be available for enforcement actions (DSA requirement in the EU) and the appeal MUST be reviewed by a different reviewer than the original decision (PRC.REPORTING_APPEALS_AND_ENFORCEMENT.006, .007)."
- "A report-review SLA MUST be defined by severity tier so imminent-harm reports are not left unactioned (PRC.REPORTING_APPEALS_AND_ENFORCEMENT.012)."
- "Moderation/enforcement decisions MUST be logged immutably with reason and reviewer, and moderators MUST be given context (thread, history, prior violations) (PRC.CONTENT_MODERATION_PIPELINE.011, .012)."
- "A transparency report MUST be published covering volumes, actions, and appeal outcomes, and government/legal takedown requests MUST be logged and legally reviewed (PRC.T_AND_S_OPERATIONS_AND_TRANSPARENCY.006, .007)."
- "Prevalence of violating content MUST be measured, not just volume removed; core metrics are report volume, time-to-action, reversal rate, and prevalence (PRC.T_AND_S_OPERATIONS_AND_TRANSPARENCY.011, .012)."

known_failure_modes:
- "Shipping user-generated content with no published policy and no human-review escalation path."
- "Hosting user media uploads with no CSAM detection and no NCMEC CyberTipline reporting process (a legal violation)."
- "Detecting CSAM but failing to preserve evidence with chain of custody and restricted access, or not notifying authorities."
- "Automated classifiers tuned without measuring precision, recall, and false-positive rate, so legitimate content is over-removed or harmful content slips through."
- "Self-harm content removed silently with no crisis resources surfaced to the user."
- "Removing content or banning users with no appeal path, or letting the original reviewer also decide the appeal (DSA breach)."
- "Report queues growing unbounded with no severity-tiered SLA, so imminent-harm reports sit unactioned."
- "Reporting 'volume removed' as success while prevalence of violating content is never measured; no transparency report; moderator wellness ignored."

validation_tests:
- "Confirm the content policy / community guidelines is published and the chosen moderation strategy (pre/post/reactive/hybrid) is documented."
- "Submit known-bad test media and confirm CSAM hash-matching fires and routes into the preservation + NCMEC reporting path (in a controlled test fixture)."
- "Submit borderline content and confirm it lands in the human-review queue with full context (thread, history, prior violations)."
- "File an in-product report for each content type and confirm the reporter receives acknowledgment and the report enters the queue with a severity tier and SLA clock."
- "Take an enforcement action, then file an appeal, and confirm the appeal is routed to a different reviewer and the outcome is logged immutably."
- "Inspect the moderation log and confirm each decision records reason and reviewer (immutable)."
- "Generate a transparency report and confirm it includes volumes, actions, appeal outcomes, and government/legal request counts."
- "Confirm classifier accuracy (precision, recall, false-positive rate) and prevalence-of-violating-content are measured, not just volume removed."

