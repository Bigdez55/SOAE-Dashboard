# scoring_rubric.yaml — makes "platinum grade production ready" a measurable bar.
#
# Scoring model:
#   - Every item has an effective severity (item override else section/category default).
#   - A verdict per item: pass | fail | na | unknown.
#       na      -> excluded from the denominator (not applicable to this profile).
#       unknown -> counts as NOT passed (honest: un-audited is not a pass).
#   - pass_ratio[severity] = passed / (passed + failed + unknown)   within the assessed scope.
#   - A tier is achieved when ALL of its `requires` ratios are met (>=) AND its gates hold.
#   - Roll-up: item -> section -> category -> overall. The overall tier is the
#     LOWEST category tier among in-scope categories, then capped by the global gates.

schema_version: '1.0'
rubric_id: PRC_SCORING_RUBRIC_001
severities: [critical, high, medium, low]

unknown_counts_as: not_passed     # honest default; unknown is never silently a pass
na_excluded_from_denominator: true

tiers:
  bronze:
    requires: { critical: 1.00 }
  silver:
    requires: { critical: 1.00, high: 1.00 }
  gold:
    requires: { critical: 1.00, high: 1.00, medium: 0.90 }
    no_open_blockers_in: [critical, high]
  platinum:
    requires: { critical: 1.00, high: 1.00, medium: 0.95, low: 0.90 }
    global_gates:
      every_in_scope_category_min_tier: gold
      every_none_coverage_category_has_tracked_gap_item: true

# Order high->low for resolving the achieved tier.
tier_order: [platinum, gold, silver, bronze, none]

# A tier is only CERTIFIED when enough of the in-scope corpus was actually assessed.
# Below this coverage_depth the scorer reports "incomplete (floor: <tier>)" instead of
# awarding a medal — an unassessed item must never count as a pass toward a tier.
certification:
  min_coverage_depth_percent: 90

reporting:
  completion_percent: passed / (passed + failed + unknown)   # for the summary.md "visual"
  show_unknown_explicitly: true
