overlay_id: OVERLAY_FINTECH
industry: "Fintech / Payments / PCI-DSS"
applies_on: ["*"]
add_required_categories:
- Payments & Financial Systems
- Identity Verification & KYC/AML
- Fraud & Abuse Prevention
- Legal & Regulatory Compliance
- Audit Logging, Forensics & eDiscovery
- Encryption & Cryptography
- Security & Authentication
- Threat Modeling & Zero Trust
- Rate Limiting, Quotas & Traffic Shaping
severity_bumps:
  Payments & Financial Systems: critical
  Identity Verification & KYC/AML: critical
  Fraud & Abuse Prevention: high
  Encryption & Cryptography: critical
  Audit Logging, Forensics & eDiscovery: high
min_tier_override: platinum
rationale: >
  PCI-DSS + KYC/AML + SCA/PSD2: cardholder data must never touch servers
  (hosted tokenization), sanctions/PEP screening enforced, transaction monitoring
  for AML, full audit trail, and chargeback/fraud controls. Mandatory for fintech.
