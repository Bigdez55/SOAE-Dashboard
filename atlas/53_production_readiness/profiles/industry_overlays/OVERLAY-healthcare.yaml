overlay_id: OVERLAY_HEALTHCARE
industry: "Healthcare / HIPAA"
applies_on: ["*"]
add_required_categories:
- Data & Privacy Compliance
- Legal & Regulatory Compliance
- Encryption & Cryptography
- Audit Logging, Forensics & eDiscovery
- Identity Verification & KYC/AML
- Security & Authentication
- Disaster Recovery & BCP
- Vendor & Third-Party Risk
severity_bumps:
  Data & Privacy Compliance: critical
  Encryption & Cryptography: critical
  Audit Logging, Forensics & eDiscovery: high
  Legal & Regulatory Compliance: high
min_tier_override: platinum
rationale: >
  HIPAA/HITECH: PHI must be encrypted at rest and in transit, every PHI access
  audited, BAAs in place, minimum-necessary access, and breach-notification ready.
  These categories are non-negotiable for any healthcare engagement.
