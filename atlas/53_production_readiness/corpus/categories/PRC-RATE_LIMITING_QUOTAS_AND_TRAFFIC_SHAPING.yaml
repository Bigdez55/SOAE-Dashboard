- id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT
  name: Distributed Enforcement
  items:
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.001
    text: Rate limit state in shared store (Redis) for multi-instance consistency
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.002
    text: Atomic increment/check to avoid race conditions (Lua script or atomic ops)
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.003
    text: Rate limiting at the edge/gateway in addition to application layer
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.004
    text: Limiter store failure mode defined (fail-open vs fail-closed) deliberately
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.005
    text: Limiter store high-availability configured
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.006
    text: Limiter latency minimal so it does not bottleneck requests
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.007
    text: Distributed limit accuracy vs performance trade-off documented
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.008
    text: Sliding-window or token-bucket implemented correctly across nodes
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.009
    text: Limiter store memory and key expiry managed
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.010
    text: Limiter resilient to clock skew across nodes
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.011
    text: 'Limiter metrics: allowed, throttled, near-limit per dimension'
  - id: PRC.RATE_LIMITING_QUOTAS_AND_TRAFFIC_SHAPING.DISTRIBUTED_ENFORCEMENT.012
    text: Limiter behavior verified under load test
