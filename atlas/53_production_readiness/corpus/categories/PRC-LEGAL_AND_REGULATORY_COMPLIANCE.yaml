    text: GDPR/PECR consent for marketing email to EU/UK recipients
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.MARKETING_AND_COMMUNICATIONS_LAW.005
    text: SMS marketing consent and opt-out (TCPA in US) compliant
