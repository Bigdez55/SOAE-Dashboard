    text: Misleading advertising and false claims reviewed by legal
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.MARKETING_AND_COMMUNICATIONS_LAW.008
    text: Endorsement and testimonial disclosures (FTC) where required
