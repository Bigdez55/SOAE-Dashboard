    text: Comparative advertising reviewed for legal risk
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.MARKETING_AND_COMMUNICATIONS_LAW.012
    text: Consent records retained as proof for audits and disputes
- id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW
  name: Cookie & Tracking Law
  items:
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.001
    text: Cookie consent compliant with ePrivacy Directive and GDPR
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.002
    text: Non-essential cookies and trackers blocked until consent
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.003
    text: Granular consent by purpose (necessary, analytics, marketing)
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.004
    text: Consent withdrawal as easy as granting
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.005
    text: Cookie banner not using dark patterns (reject as easy as accept)
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.006
    text: Consent records stored with proof and timestamp
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.007
    text: Cookie policy lists every cookie, purpose, duration, and party
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.008
    text: Consent re-prompted when purposes or vendors change
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.009
    text: Consent signal propagated to tag manager and downstream tools
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.010
    text: Third-party tag inventory maintained and reviewed
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.011
    text: Global Privacy Control / opt-out preference signals honored
  - id: PRC.LEGAL_AND_REGULATORY_COMPLIANCE.COOKIE_AND_TRACKING_LAW.012
    text: Consent solution audited for compliance (e.g., IAB TCF where used)
