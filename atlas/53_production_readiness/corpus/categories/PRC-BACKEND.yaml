sections:
- id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER
  name: API & Middleware Layer
  items:
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.001
    text: 'Framework selected and justified: Express, FastAPI, NestJS, Gin, Django, Rails, Spring'
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.002
    text: 'Middleware ordered correctly: tracing → auth → rate limit → logging → validation → handler'
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.003
    text: 'All inputs validated against schema before handler: Zod, Pydantic, Joi, or validator'
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.004
    text: Validation errors return 422 with field-level error details
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.005
    text: 'Input sanitized: trimmed, HTML stripped where plain text expected'
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.006
    text: 'File upload: multipart size limit enforced, MIME type validated, content scanned'
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.007
    text: 'CORS: allowed origins explicitly enumerated; no wildcard * in production'
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.008
    text: Gzip/Brotli compression middleware active
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.009
    text: Request body size limit enforced
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.010
    text: 'Request timeout: requests killed after bounded time if not completed'
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.011
    text: Rate limiting per IP and per authenticated user with appropriate buckets
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.012
    text: Request and response logged with correlation ID on every request
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.013
    text: API versioning routing handles multiple active API versions
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.014
    text: OpenAPI spec auto-generated or kept in sync with code
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.015
    text: Request ID generated at ingress and returned in response headers
  - id: PRC.BACKEND.API_AND_MIDDLEWARE_LAYER.016
    text: Health check endpoints bypass authentication middleware
- id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER
  name: Service & Business Logic Layer
  items:
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.001
    text: Business logic in service classes only; not in controllers or repositories
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.002
    text: 'Services stateless: no mutable instance-level state'
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.003
    text: 'Dependency injection configured: InversifyJS, NestJS DI, FastAPI DI, Spring'
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.004
    text: Interfaces defined for all external dependencies (enables mocking in tests)
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.005
    text: Domain events emitted from service layer, not from controllers
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.006
    text: Transaction boundaries defined at service layer, not scattered through codebase
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.007
    text: 'Distributed transaction strategy: Saga pattern for cross-service operations'
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.008
    text: Compensation logic defined for every step in all Sagas
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.009
    text: 'CQRS: read models separate from write models where divergence justifies it'
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.010
    text: Command/query objects as first-class types in clean architecture
  - id: PRC.BACKEND.SERVICE_AND_BUSINESS_LOGIC_LAYER.011
    text: Service layer unit-tested with all external dependencies mocked
- id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS
  name: Data Access & Background Jobs
  items:
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.001
    text: Repository pattern abstracts all data access from business logic
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.002
    text: All data access through repositories; no ORM calls in controllers or services
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.003
    text: 'N+1 queries prevented: eager loading, DataLoader batch pattern'
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.004
    text: Database transactions wrapped at service boundary (unit of work pattern)
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.005
    text: Optimistic locking for concurrent update scenarios
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.006
    text: Cursor-based pagination at DB level for large collections
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.007
    text: Read replicas used for read-heavy queries via repository configuration
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.008
    text: Query timeout configured at ORM level
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.009
    text: Raw SQL uses parameterized queries only; never string interpolation
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.010
    text: 'Job queue system: BullMQ, Sidekiq, Celery, or Temporal'
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.011
    text: 'Jobs are idempotent: safe to run more than once with same input'
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.012
    text: Jobs have unique ID to prevent duplicate processing
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.013
    text: 'Retry: exponential backoff with jitter, bounded max retry count'
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.014
    text: DLQ for jobs exhausting retries; monitored with alerting
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.015
    text: 'Job timeout: kills jobs running beyond expected duration'
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.016
    text: 'Background jobs not block request path: always async'
  - id: PRC.BACKEND.DATA_ACCESS_AND_BACKGROUND_JOBS.017
    text: 'Job observability: queue depth, processing rate, failure rate dashboarded'
- id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS
  name: Scalability & Statelessness
  items:
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.001
    text: 'Application instances stateless: no in-memory session, cache, or local file storage'
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.002
    text: Sessions externalized to Redis or database
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.003
    text: Uploaded files go to object storage (S3, GCS); not local disk
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.004
    text: 'No sticky sessions needed: any instance handles any request'
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.005
    text: 'Horizontal scaling tested: 1 → 4 → 10 instances, throughput scales linearly'
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.006
    text: 'WebSocket connections: pub/sub layer (Redis) ensures messages reach correct instance'
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.007
    text: Rate limiting state in Redis for multi-instance consistency
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.008
    text: 'File serving: never from app process; always CDN or object storage'
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.009
    text: External configuration service for runtime-tunable values without redeploy
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.010
    text: 'Connection pools tuned: min, max, timeout, eviction policy set'
  - id: PRC.BACKEND.SCALABILITY_AND_STATELESSNESS.011
    text: Pool exhaustion monitored and alerted
