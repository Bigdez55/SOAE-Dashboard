sections:
- id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE
  name: Account Structure & Governance
  items:
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.001
    text: Root/owner account MFA enabled; credentials vaulted and never used day-to-day
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.002
    text: 'Organization hierarchy: separate accounts for prod, staging, dev, security, logging'
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.003
    text: Billing consolidated but with per-account budget alerts
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.004
    text: 'Landing zone configured: AWS Control Tower, GCP Landing Zone, or Azure CAF'
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.005
    text: Service Control Policies (SCPs) / Org Policies restricting dangerous actions org-wide
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.006
    text: 'Tagging strategy enforced on all resources: env, team, project, cost-center tags'
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.007
    text: Resource naming conventions enforced globally
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.008
    text: Allowed regions policy enforced for data sovereignty requirements
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.009
    text: 'CSPM tool active: AWS Security Hub, Microsoft Defender for Cloud, Wiz, or Lacework'
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.010
    text: Compliance posture dashboard visible to security team
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.011
    text: Service quotas reviewed; increase requests filed before reaching limits
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.012
    text: Trusted Advisor / Recommender checks reviewed monthly
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.013
    text: CloudTrail / Cloud Audit Logs enabled in all accounts and regions
  - id: PRC.CLOUD_PLATFORM.ACCOUNT_STRUCTURE_AND_GOVERNANCE.014
    text: All account root email addresses go to a group, not an individual
- id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING
  name: Compute & Auto-Scaling
  items:
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.001
    text: Instance types right-sized for workload (not over-provisioned)
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.002
    text: Auto-scaling groups with scale-out and scale-in policies
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.003
    text: Scale-in protection on instances actively processing long-running jobs
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.004
    text: Launch templates / AMIs versioned and immutable; never modified in place
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.005
    text: Spot/preemptible instances for stateless, fault-tolerant workloads (40-60% of fleet)
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.006
    text: Warm pools to reduce cold start latency during scale-out events
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.007
    text: Serverless function timeout set to actual need plus 20% buffer
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.008
    text: Serverless concurrency limits and reserved concurrency defined
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.009
    text: Container services configured with rolling updates and health checks
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.010
    text: IMDSv2 enforced on all EC2 instances (hop limit = 1)
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.011
    text: No hard-coded AMI/image IDs; use Parameter Store or registry lookups
  - id: PRC.CLOUD_PLATFORM.COMPUTE_AND_AUTO_SCALING.012
    text: 'Compute modernization review: serverless vs container vs VM trade-off documented'
- id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES
  name: Storage & Data Services
  items:
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.001
    text: Object storage versioning enabled on all critical buckets
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.002
    text: S3/GCS public access blocked by default; explicit allow only where required
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.003
    text: 'Lifecycle policies: transition to cheaper tiers after 30/90/365 days'
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.004
    text: Cross-region replication on critical buckets for disaster recovery
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.005
    text: Block storage snapshots automated daily with retention policy
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.006
    text: Presigned URLs used for temporary, scoped access to private objects
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.007
    text: 'Server-side encryption: SSE-S3 minimum, SSE-KMS for sensitive/regulated data'
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.008
    text: KMS key rotation enabled; annual minimum
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.009
    text: Storage cost anomaly detection configured
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.010
    text: Storage access logging enabled for sensitive buckets
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.011
    text: Multi-part upload lifecycle rule cleans up incomplete uploads after 7 days
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.012
    text: CORS configured to allow only required origins on storage buckets
  - id: PRC.CLOUD_PLATFORM.STORAGE_AND_DATA_SERVICES.013
    text: Intelligent-Tiering evaluated for buckets with variable access patterns
- id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM
  name: Networking & IAM
  items:
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.001
    text: VPC/VNet designed with documented CIDR blocks and IP allocation plan
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.002
    text: Public subnets contain only load balancers and NAT gateways
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.003
    text: Private subnets for all application and database workloads
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.004
    text: 'Security groups follow least-privilege: deny all, allow specific ports'
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.005
    text: No security groups with 0.0.0.0/0 inbound except ports 80/443 on edge LB
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.006
    text: VPC Flow Logs enabled and sent to SIEM/log storage
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.007
    text: VPC Endpoints for AWS services to avoid unnecessary internet traffic
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.008
    text: Private DNS zones for internal service discovery
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.009
    text: PrivateLink/Private Service Connect for SaaS services inside VPC
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.010
    text: WAF with managed rule sets deployed in front of ALB/CloudFront
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.011
    text: DDoS protection (Shield Standard minimum) enabled
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.012
    text: IAM roles for all compute (never long-lived access keys on instances)
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.013
    text: IAM users removed; replaced by SSO/federated identity for humans
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.014
    text: IAM policies attached to roles/groups, never directly to users
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.015
    text: IAM Access Analyzer enabled; external access findings reviewed
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.016
    text: 'Least-privilege IAM: no wildcard (*) actions or resources without justification'
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.017
    text: Privilege escalation paths reviewed and eliminated
  - id: PRC.CLOUD_PLATFORM.NETWORKING_AND_IAM.018
    text: Service-to-service permissions via IAM roles, not shared credentials
- id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION
  name: Cost Management & Multi-Region
  items:
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.001
    text: Monthly budget alerts at 80% and 100% of expected spend
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.002
    text: Cost anomaly detection enabled with immediate alert on spike
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.003
    text: Reserved Instances or Savings Plans purchased for stable compute
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.004
    text: 'Unused resources reviewed monthly: idle EIPs, unattached volumes, stopped instances'
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.005
    text: Right-sizing analysis run quarterly
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.006
    text: Cost per customer / unit economic tracked in analytics dashboard
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.007
    text: 'Multi-region strategy documented: active-active vs active-passive vs pilot light'
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.008
    text: Primary and DR region explicitly defined
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.009
    text: Database cross-region replica or global database configured for DR
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.010
    text: DNS failover with health checks to switch to DR region automatically
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.011
    text: Static assets served from CDN edge globally, not just primary region
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.012
    text: RTO and RPO defined and achievable with current multi-region setup
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.013
    text: DR drills executed quarterly with documented results
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.014
    text: Runbook for regional failover tested; execution < 15 minutes
  - id: PRC.CLOUD_PLATFORM.COST_MANAGEMENT_AND_MULTI_REGION.015
    text: 'Application stateless: no region-specific local storage or in-memory state'
