    text: Step-up authentication required for highest-risk admin actions
  - id: PRC.ADMIN_CONSOLE_AND_INTERNAL_OPS.INTERNAL_TOOL_SECURITY.005
    text: Admin access restricted by RBAC and least privilege
  - id: PRC.ADMIN_CONSOLE_AND_INTERNAL_OPS.INTERNAL_TOOL_SECURITY.006
    text: IP allowlist or device trust required for most sensitive admin functions
  - id: PRC.ADMIN_CONSOLE_AND_INTERNAL_OPS.INTERNAL_TOOL_SECURITY.007
    text: 'Every admin action logged immutably: actor, target, timestamp, IP, reason'
  - id: PRC.ADMIN_CONSOLE_AND_INTERNAL_OPS.INTERNAL_TOOL_SECURITY.008
    text: Sensitive PII masked by default in all admin views
  - id: PRC.ADMIN_CONSOLE_AND_INTERNAL_OPS.INTERNAL_TOOL_SECURITY.009
    text: PII reveal requires explicit click and reason logged
  - id: PRC.ADMIN_CONSOLE_AND_INTERNAL_OPS.INTERNAL_TOOL_SECURITY.010
    text: Admin exports watermarked with requesting admin identity
  - id: PRC.ADMIN_CONSOLE_AND_INTERNAL_OPS.INTERNAL_TOOL_SECURITY.011
    text: Admin API protected against CSRF, IDOR, and mass assignment
  - id: PRC.ADMIN_CONSOLE_AND_INTERNAL_OPS.INTERNAL_TOOL_SECURITY.012
