sections:
- id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING
  name: Domain, DNS & Hosting
  items:
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.001
    text: Domain registered with reputable registrar (Cloudflare, Namecheap, Google Domains)
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.002
    text: Auto-renew enabled on domain and expiry monitored
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.003
    text: Domain locked against unauthorized transfer
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.004
    text: WHOIS privacy/domain protection enabled
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.005
    text: 'All DNS records verified: A, AAAA, CNAME, MX, TXT, SRV, CAA'
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.006
    text: CAA record restricts certificate issuance to authorized CAs only
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.007
    text: DNSSEC enabled on domain
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.008
    text: IPv6 (AAAA) records configured
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.009
    text: www ↔ non-www redirect consistent (301 permanent)
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.010
    text: 'HTTP → HTTPS redirect: 301, not 302'
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.011
    text: Trailing slash behavior consistent and permanently redirected
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.012
    text: SSL/TLS certificate auto-renews via ACME/Let's Encrypt or managed cert
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.013
    text: Certificate expiry monitored with alert at 30/14/7/1 days
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.014
    text: Wildcard or multi-domain cert covers all active subdomains
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.015
    text: 'HSTS header: max-age ≥ 31536000, includeSubDomains, preload'
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.016
    text: HSTS preload submitted to chromium HSTS preload list
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.017
    text: CDN configured; all static assets served from CDN edge
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.018
    text: 'CDN cache rules tuned: HTML short TTL, hashed assets immutable'
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.019
    text: Origin server blocked from direct internet access (behind CDN only)
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.020
    text: DNS failover with health checks configured at DNS provider
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.021
    text: Secondary DNS provider for redundancy
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.022
    text: Server geographic region optimized for primary user audience
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.023
    text: Nameserver TTL lowered before any planned DNS migration
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.024
    text: SSL Labs grade A+ verified at ssllabs.com
  - id: PRC.WEBSITE.DOMAIN_DNS_AND_HOSTING.025
    text: TLS 1.3 preferred, TLS 1.2 minimum, TLS 1.0/1.1 disabled
- id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE
  name: Core Web Vitals & Performance
  items:
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.001
    text: Largest Contentful Paint (LCP) < 2.5s on mobile and desktop
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.002
    text: Interaction to Next Paint (INP) < 200ms
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.003
    text: Cumulative Layout Shift (CLS) < 0.1
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.004
    text: First Contentful Paint (FCP) < 1.8s
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.005
    text: Time to First Byte (TTFB) < 800ms
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.006
    text: PageSpeed Insights ≥ 90 on both mobile and desktop
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.007
    text: WebPageTest run from multiple global locations
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.008
    text: Images served in WebP/AVIF format
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.009
    text: Images correctly sized; no oversized images being downscaled in browser
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.010
    text: 'Responsive images: srcset and sizes attributes on all variable-width images'
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.011
    text: 'LCP image preloaded: <link rel=preload fetchpriority=high>'
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.012
    text: Below-fold images use loading=lazy
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.013
    text: 'Fonts preloaded and font-display: swap or optional applied'
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.014
    text: Self-hosted fonts to eliminate third-party DNS round trips
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.015
    text: No render-blocking scripts (defer/async on all non-critical JS)
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.016
    text: JavaScript bundle code-split with dynamic imports per route
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.017
    text: Unused JavaScript removed; tree-shaking verified with bundle analyzer
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.018
    text: Unused CSS purged (PurgeCSS, Tailwind JIT)
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.019
    text: HTML, CSS, JS minified in production builds
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.020
    text: Gzip or Brotli compression verified active on all text assets
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.021
    text: HTTP/2 or HTTP/3 (QUIC) enabled on server and CDN
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.022
    text: Preconnect hints for all critical third-party origins
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.023
    text: Total JS < 300kb gzipped, total page weight < 1MB
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.024
    text: Main thread long tasks < 50ms; no layout shifts from late-loading content
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.025
    text: Third-party scripts audited; each one justified, loaded async/deferred
  - id: PRC.WEBSITE.CORE_WEB_VITALS_AND_PERFORMANCE.026
    text: Real User Monitoring (RUM) collecting Core Web Vitals field data
- id: PRC.WEBSITE.SEO
  name: SEO
  items:
  - id: PRC.WEBSITE.SEO.001
    text: Unique, descriptive <title> on every page (50–60 chars)
  - id: PRC.WEBSITE.SEO.002
    text: Unique meta description on every page (150–160 chars)
  - id: PRC.WEBSITE.SEO.003
    text: Single H1 per page, unique and keyword-relevant
  - id: PRC.WEBSITE.SEO.004
    text: 'Logical heading hierarchy: H1 → H2 → H3, no skipped levels'
  - id: PRC.WEBSITE.SEO.005
    text: Self-referencing canonical URL on all pages
  - id: PRC.WEBSITE.SEO.006
    text: 'Open Graph tags: og:title, og:description, og:image, og:url, og:type'
  - id: PRC.WEBSITE.SEO.007
    text: Twitter Card meta tags complete
  - id: PRC.WEBSITE.SEO.008
    text: 'JSON-LD structured data: Organization, WebSite, BreadcrumbList, Article as applicable'
  - id: PRC.WEBSITE.SEO.009
    text: XML sitemap generated, up to date, submitted to Google Search Console and Bing
  - id: PRC.WEBSITE.SEO.010
    text: robots.txt properly configured; not blocking critical pages
  - id: PRC.WEBSITE.SEO.011
    text: Accidental noindex confirmed absent from all production pages
  - id: PRC.WEBSITE.SEO.012
    text: Hreflang tags for all multi-language/multi-region variants
  - id: PRC.WEBSITE.SEO.013
    text: 301 redirects in place for all old or changed URLs
  - id: PRC.WEBSITE.SEO.014
    text: Broken links and 404s monitored and resolved within 24h
  - id: PRC.WEBSITE.SEO.015
    text: 'Internal linking: no page > 3 clicks from homepage, no orphan pages'
  - id: PRC.WEBSITE.SEO.016
    text: 'URL structure: clean, short, descriptive, lowercase, hyphens'
  - id: PRC.WEBSITE.SEO.017
    text: 'Faceted navigation / filter URLs: noindex or canonical strategy applied'
  - id: PRC.WEBSITE.SEO.018
    text: Google Search Console verified; errors reviewed weekly
  - id: PRC.WEBSITE.SEO.019
    text: Core Web Vitals passing in GSC CrUX report
  - id: PRC.WEBSITE.SEO.020
    text: Schema validation passing in Google Rich Results Test
  - id: PRC.WEBSITE.SEO.021
    text: Crawl budget not wasted on duplicate or low-value pages
- id: PRC.WEBSITE.SECURITY_HEADERS
  name: Security Headers
  items:
  - id: PRC.WEBSITE.SECURITY_HEADERS.001
    text: Content-Security-Policy (CSP) enforced in production (not report-only)
  - id: PRC.WEBSITE.SECURITY_HEADERS.002
    text: CSP avoids 'unsafe-inline' and 'unsafe-eval'; uses nonce or hash for exceptions
  - id: PRC.WEBSITE.SECURITY_HEADERS.003
    text: 'X-Frame-Options: DENY (or CSP frame-ancestors ''none'')'
  - id: PRC.WEBSITE.SECURITY_HEADERS.004
    text: 'X-Content-Type-Options: nosniff'
  - id: PRC.WEBSITE.SECURITY_HEADERS.005
    text: 'Referrer-Policy: strict-origin-when-cross-origin'
  - id: PRC.WEBSITE.SECURITY_HEADERS.006
    text: Permissions-Policy restricts camera, microphone, geolocation, payment
  - id: PRC.WEBSITE.SECURITY_HEADERS.007
    text: 'Cross-Origin-Opener-Policy: same-origin'
  - id: PRC.WEBSITE.SECURITY_HEADERS.008
    text: 'Cross-Origin-Resource-Policy: same-origin or same-site'
  - id: PRC.WEBSITE.SECURITY_HEADERS.009
    text: Server version header removed (Server, X-Powered-By hidden)
  - id: PRC.WEBSITE.SECURITY_HEADERS.010
    text: 'Cache-Control: no-store on all authenticated and sensitive pages'
  - id: PRC.WEBSITE.SECURITY_HEADERS.011
    text: 'Set-Cookie: Secure, HttpOnly, SameSite=Strict or Lax on all cookies'
  - id: PRC.WEBSITE.SECURITY_HEADERS.012
    text: Security headers graded A+ at securityheaders.com
  - id: PRC.WEBSITE.SECURITY_HEADERS.013
    text: OCSP stapling enabled on server
  - id: PRC.WEBSITE.SECURITY_HEADERS.014
    text: 'Weak cipher suites disabled: no RC4, 3DES, EXPORT ciphers'
  - id: PRC.WEBSITE.SECURITY_HEADERS.015
    text: Perfect Forward Secrecy enabled (ECDHE key exchange)
  - id: PRC.WEBSITE.SECURITY_HEADERS.016
    text: Certificate Transparency monitored via crt.sh alerts for unexpected issuances
- id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA
  name: Accessibility (WCAG 2.2 AA)
  items:
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.001
    text: 'All images: descriptive alt text or alt='''' for decorative images'
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.002
    text: 'Color contrast: ≥ 4.5:1 for normal text, ≥ 3:1 for large text'
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.003
    text: Color not the only means of conveying information
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.004
    text: All interactive elements keyboard accessible (Tab, Enter, Space, Arrow keys)
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.005
    text: Focus indicators visible and high-contrast on every element
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.006
    text: Focus order logical and matches visual reading order
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.007
    text: Skip navigation link at top of every page
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.008
    text: ARIA roles, states, properties used correctly; no unnecessary ARIA
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.009
    text: All form inputs have associated <label> elements
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.010
    text: 'Form errors: identify field, describe issue, suggest fix'
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.011
    text: Required fields marked without color alone
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.012
    text: Modal dialogs trap focus and restore focus on close
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.013
    text: Dynamic updates announced via aria-live regions
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.014
    text: Videos have synchronized captions; audio has transcripts
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.015
    text: No content flashes > 3 times per second
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.016
    text: Layout functional and usable when zoomed to 400%
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.017
    text: Touch targets ≥ 24×24 CSS pixels with ≥ 24px spacing (WCAG 2.2)
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.018
    text: Drag-and-drop and pointer gestures have keyboard/single-pointer alternatives
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.019
    text: VoiceOver (macOS/iOS) and NVDA (Windows) tested manually
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.020
    text: 'Automated a11y scan in CI: axe-core, jest-axe, or Lighthouse a11y'
  - id: PRC.WEBSITE.ACCESSIBILITY_WCAG_2_2_AA.021
    text: Keyboard-only navigation tested on all critical user flows
- id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA
  name: Legal, Analytics & PWA
  items:
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.001
    text: Cookie consent banner GDPR/CCPA compliant; non-essential cookies blocked until consent
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.002
    text: 'Privacy policy: complete, current, accessible from every page'
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.003
    text: Terms of service complete and accessible
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.004
    text: Cookie policy lists all cookies with purpose and duration
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.005
    text: Security.txt published at /.well-known/security.txt
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.006
    text: DMCA/copyright takedown contact available
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.007
    text: Uptime monitoring with < 1 min detection and immediate alert
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.008
    text: Synthetic monitoring on critical user flows (login, checkout, signup)
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.009
    text: RUM collecting field Web Vitals
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.010
    text: 404 and error page events tracked in analytics
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.011
    text: Google Analytics 4 + Search Console verified and linked
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.012
    text: Conversion events defined and tracked
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.013
    text: Session recording configured with consent (Hotjar, FullStory)
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.014
    text: Web app manifest (manifest.json) complete with all required fields
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.015
    text: Service worker registered; critical assets cached
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.016
    text: Offline fallback page served when network unavailable
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.017
    text: Maskable icon for Android adaptive icons
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.018
    text: PWA installability passing in Lighthouse
  - id: PRC.WEBSITE.LEGAL_ANALYTICS_AND_PWA.019
    text: App tested installed on Android and iOS home screen
