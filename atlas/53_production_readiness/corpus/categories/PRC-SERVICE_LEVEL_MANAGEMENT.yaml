sections:
- id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION
  name: SLI & SLO Definition
  items:
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.001
    text: 'SLI type chosen per service: availability, latency, error rate, throughput, correctness'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.002
    text: 'Availability SLI: good_requests / total_requests (excluding health checks)'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.003
    text: 'Latency SLI: % requests completing within defined threshold (e.g., 95% < 500ms)'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.004
    text: 'Error rate SLI: % requests resulting in 5xx errors'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.005
    text: 'Freshness SLI for pipelines: % records up-to-date within defined window'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.006
    text: 'SLI measurement point defined: what layer generates the metric'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.007
    text: SLI excludes planned maintenance windows
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.008
    text: SLI captures user-visible failures only (not internal noise)
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.009
    text: 'SLO target set per service: 99.9% Tier 1, 99.5% Tier 2, 99% Tier 3 (examples)'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.010
    text: 'SLO window: 28-day rolling (preferred over calendar month)'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.011
    text: Error budget = 100% - SLO (99.9% SLO = 43.8 min/month error budget)
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.012
    text: 'Error budget burn rate alert: 14.4x faster than normal over 1 hour'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.013
    text: 'Error budget burn rate alert: 6x faster than normal over 6 hours'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.014
    text: 'Error budget policy: feature work pauses when budget < 20% remaining'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.015
    text: 'SLO review: targets adjusted quarterly based on actual performance'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLI_AND_SLO_DEFINITION.016
    text: SLO dashboard visible to all engineers and product stakeholders
- id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION
  name: SLA Contracts & Communication
  items:
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.001
    text: Customer-facing SLA defined per customer tier
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.002
    text: SLA uptime commitment matches or exceeds internal SLO
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.003
    text: 'SLA credits: compensation structure defined for breaches'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.004
    text: 'SLA exclusions documented: planned maintenance, force majeure'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.005
    text: 'Maintenance window notification: 48h advance notice minimum'
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.006
    text: Customer-facing status page maintained (Statuspage.io)
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.007
    text: Status page incident communication within 15 minutes of detection
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.008
    text: Status page post-incident update with root cause summary
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.009
    text: Monthly uptime report available to enterprise customers
  - id: PRC.SERVICE_LEVEL_MANAGEMENT.SLA_CONTRACTS_AND_COMMUNICATION.010
    text: SLA breach tracked and reported to account team
