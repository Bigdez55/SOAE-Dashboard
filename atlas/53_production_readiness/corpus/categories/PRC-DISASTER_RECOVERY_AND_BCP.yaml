sections:
- id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING
  name: Recovery Objectives & Planning
  items:
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.001
    text: 'RTO defined per service tier: critical < 1h, important < 4h, standard < 24h'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.002
    text: 'RPO defined per service tier: critical < 15min, important < 1h, standard < 24h'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.003
    text: 'Service tier classification documented: Tier 1 (revenue), Tier 2 (operational), Tier 3 (non-critical)'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.004
    text: 'Business impact analysis (BIA) completed: cost per hour of downtime per service'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.005
    text: Maximum Tolerable Downtime (MTD) defined per business function
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.006
    text: 'RPO tested: last recoverable point is within defined RPO'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.007
    text: 'RTO tested: system restored from scratch within defined RTO'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.008
    text: RTO/RPO gap analysis documented; remediation plan in progress for gaps
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.009
    text: Cyber incident response integrated with DR plan
  - id: PRC.DISASTER_RECOVERY_AND_BCP.RECOVERY_OBJECTIVES_AND_PLANNING.010
    text: Insurance coverage for cyber incidents and data breaches reviewed
- id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY
  name: Backup Strategy
  items:
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.001
    text: '3-2-1 backup rule enforced: 3 copies, 2 different media types, 1 offsite'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.002
    text: Daily automated full backups for all databases
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.003
    text: Hourly incremental backups for Tier 1 services
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.004
    text: PITR enabled for all production databases
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.005
    text: Object storage versioning for all critical buckets
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.006
    text: Code repositories mirrored to secondary location
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.007
    text: IaC state and K8s config backed up and restorable
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.008
    text: Secrets backed up securely with cross-region replication
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.009
    text: 'Backup encryption: AES-256 with key separate from backup data'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.010
    text: 'Retention: daily → 30d, weekly → 52wk, monthly → 7yr for financial data'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.011
    text: Backup integrity checksums verified after creation
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.012
    text: Restoration tested monthly for each service tier
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.013
    text: 'Immutable backups: write-locked storage preventing deletion without MFA'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.BACKUP_STRATEGY.014
    text: Backup restoration time measured and within RTO
- id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP
  name: Failover, Drills & BCP
  items:
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.001
    text: 'DB failover automated: replica promotion in < 60s'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.002
    text: 'DNS failover: health checks at DNS switch in < 5 minutes'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.003
    text: 'Multi-AZ: all Tier 1 services span minimum 2 availability zones'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.004
    text: 'Multi-region DR: active-passive or active-active per service RTO requirement'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.005
    text: Regional failover tested annually with documented results
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.006
    text: 'DR environment infrastructure automated via IaC: boots from zero in < 30 min'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.007
    text: 'DR drill: full failover to DR region executed and documented annually'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.008
    text: 'Backup restoration drill: restore to separate environment, verify data integrity'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.009
    text: Runbook walkthrough with entire on-call team
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.010
    text: 'DR test results: RTO and RPO achieved vs targets compared and documented'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.011
    text: Gaps identified in DR testing tracked to remediation plan
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.012
    text: 'Business continuity plan (BCP): how business operates manually during outage'
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.013
    text: Customer communication templates prepared in advance for common outage scenarios
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.014
    text: Stakeholder escalation tree documented and current
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.015
    text: Vendor contacts for ISP, cloud, CDN, DNS available offline (not only in down system)
  - id: PRC.DISASTER_RECOVERY_AND_BCP.FAILOVER_DRILLS_AND_BCP.016
    text: BCP reviewed and updated annually
