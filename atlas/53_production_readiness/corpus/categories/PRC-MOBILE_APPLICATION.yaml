- id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY
  name: Cross-Platform & Security
  items:
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.001
    text: Framework version pinned with defined upgrade path
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.002
    text: 'OTA update policy defined: Expo Updates or CodePush with signed updates'
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.003
    text: OTA updates signed and signature verified before applying
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.004
    text: Deep links tested on both iOS and Android
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.005
    text: Certificate pinning for all API calls; pin renewed before expiry
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.006
    text: Sensitive data not in logs, temp files, or screenshots
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.007
    text: App does not capture screenshots of sensitive data screens
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.008
    text: Clipboard cleared of sensitive data after defined timeout
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.009
    text: Biometric authentication (Face ID, fingerprint) integrated
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.010
    text: Session timeout after inactivity period
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.011
    text: API keys never hardcoded in client; backend proxy used
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.012
    text: All network calls use HTTPS; certificate validation enabled and not disabled
