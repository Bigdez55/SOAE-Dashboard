    text: 'Memory: no leaks on screen transitions (profiled)'
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.017
    text: 'Offline: core features usable without internet connection'
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.018
    text: 'App size: < 50MB download where possible'
  - id: PRC.MOBILE_APPLICATION.CROSS_PLATFORM_AND_SECURITY.019
    text: Crash reporting analytics configured
