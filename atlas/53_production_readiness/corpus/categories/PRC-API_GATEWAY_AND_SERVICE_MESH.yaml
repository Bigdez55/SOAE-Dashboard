sections:
- id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES
  name: API Gateway Responsibilities
  items:
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES.001
    text: Gateway selected and justified (Kong, Apigee, AWS API Gateway, Envoy, Tyk)
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES.002
    text: Authentication and authorization centralized at the gateway
