    text: Gateway does not contain business logic
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES.011
    text: API composition and aggregation handled deliberately (BFF vs gateway)
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES.012
    text: Gateway high-availability and failover configured
