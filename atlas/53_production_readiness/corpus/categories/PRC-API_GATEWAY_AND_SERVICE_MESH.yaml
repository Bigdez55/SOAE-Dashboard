- id: PRC.API_GATEWAY_AND_SERVICE_MESH.TRAFFIC_MANAGEMENT_AND_RESILIENCE
  name: Traffic Management & Resilience
  items:
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.TRAFFIC_MANAGEMENT_AND_RESILIENCE.001
    text: Retries with budgets configured at the mesh (avoid retry storms)
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.TRAFFIC_MANAGEMENT_AND_RESILIENCE.002
    text: Timeouts configured per route at the mesh layer
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.TRAFFIC_MANAGEMENT_AND_RESILIENCE.003
    text: Circuit breaking and outlier detection enabled
