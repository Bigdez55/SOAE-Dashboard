    text: Rate limiting and quota enforcement at the edge
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES.004
    text: Request and response transformation handled at the gateway, not in services
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES.005
    text: API key and token validation at the gateway
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES.006
    text: 'Request routing: host, path, header, and version-based'
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES.007
    text: Request/response logging and correlation ID injection
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.API_GATEWAY_RESPONSIBILITIES.008
    text: Payload size limits and timeout enforcement
