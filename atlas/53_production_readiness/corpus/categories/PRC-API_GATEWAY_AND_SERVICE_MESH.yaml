    text: Load balancing strategy chosen (round-robin, least-request, ring-hash)
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.TRAFFIC_MANAGEMENT_AND_RESILIENCE.008
    text: Rate limiting at mesh layer for service-to-service traffic
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.TRAFFIC_MANAGEMENT_AND_RESILIENCE.009
    text: Graceful connection draining on rollout
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.TRAFFIC_MANAGEMENT_AND_RESILIENCE.010
    text: Backpressure and concurrency limits per service
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.TRAFFIC_MANAGEMENT_AND_RESILIENCE.011
    text: gRPC and HTTP/2 traffic handled correctly through mesh and gateway
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.TRAFFIC_MANAGEMENT_AND_RESILIENCE.012
    text: Progressive delivery integrated (Flagger, Argo Rollouts)
- id: PRC.API_GATEWAY_AND_SERVICE_MESH.MESH_SECURITY_AND_OBSERVABILITY
  name: Mesh Security & Observability
  items:
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.MESH_SECURITY_AND_OBSERVABILITY.001
    text: mTLS enforced for all service-to-service traffic (strict mode)
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.MESH_SECURITY_AND_OBSERVABILITY.002
    text: Certificate issuance and rotation automated by the mesh
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.MESH_SECURITY_AND_OBSERVABILITY.003
    text: Authorization policies enforce least-privilege service-to-service access
  - id: PRC.API_GATEWAY_AND_SERVICE_MESH.MESH_SECURITY_AND_OBSERVABILITY.004
