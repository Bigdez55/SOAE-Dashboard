sections:
- id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY
  name: Pipelines & Data Quality
  items:
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.001
    text: 'Data pipeline tool: dbt, Airflow, Prefect, Dagster, or cloud-native (Glue, Dataflow)'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.002
    text: 'ELT preferred over ETL: transform in warehouse, not in transit'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.003
    text: All data sources documented with owner, schema, update frequency
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.004
    text: 'Ingestion: CDC (Debezium, Airbyte) for real-time; batch for historical'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.005
    text: 'Pipelines idempotent: re-running produces same result without duplicates'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.006
    text: 'Pipeline DAG: dependencies documented; no circular dependencies'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.007
    text: 'Pipeline failure alerting: on-call notified within 5 minutes of failure'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.008
    text: 'Late-arriving data handled: out-of-order events processed correctly'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.009
    text: 'Data freshness SLO: data available in warehouse within defined window'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.010
    text: 'Data quality framework: Great Expectations, dbt tests, or Soda'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.011
    text: 'Freshness tests: alert if table not updated within expected interval'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.012
    text: 'Null checks: critical columns have null rate below threshold'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.013
    text: 'Uniqueness tests: primary key uniqueness enforced in warehouse'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.014
    text: 'Row count anomaly detection: sudden drops or spikes trigger alert'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.015
    text: 'Schema change detection: alert on unexpected column changes'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.016
    text: Data quality failures block downstream pipeline or trigger alert
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.PIPELINES_AND_DATA_QUALITY.017
    text: 'Data issue triage process documented: who fixes, in how long'
- id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE
  name: Warehouse, BI & Governance
  items:
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.001
    text: 'Data warehouse: Snowflake, BigQuery, Redshift, or Databricks'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.002
    text: 'Warehouse access control: row-level and column-level security'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.003
    text: 'Query cost governance: budget alerts per team, expensive query approval'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.004
    text: Compute auto-suspends when idle to control cost
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.005
    text: 'dbt project: models, sources, tests, documentation all in version control'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.006
    text: dbt lineage graph documented and accessible
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.007
    text: Metrics layer defined (dbt Metrics, Cube) for consistent definitions
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.008
    text: 'Single source of truth: metrics defined once, consumed everywhere'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.009
    text: 'BI tool connected: Looker, Tableau, Metabase, Redash, or Power BI'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.010
    text: 'Dashboards: executive, operational, product, engineering views'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.011
    text: Data catalog with all tables documented (owner, description, schema)
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.012
    text: Data lineage visible end-to-end in catalog
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.013
    text: 'Sensitive data masked in BI tools: PII columns not visible to all roles'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.014
    text: 'Data retention in warehouse: old data archived to cold storage on schedule'
  - id: PRC.DATA_ENGINEERING_AND_ANALYTICS.WAREHOUSE_BI_AND_GOVERNANCE.015
    text: 'Analytics data ownership: each dataset has an assigned owner team'
