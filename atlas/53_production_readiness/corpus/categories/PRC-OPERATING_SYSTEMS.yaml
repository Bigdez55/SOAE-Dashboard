sections:
- id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS
  name: Server Hardening (CIS Benchmarks)
  items:
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.001
    text: 'Minimal OS install: only required packages installed'
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.002
    text: All packages updated to latest security releases on provisioning
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.003
    text: CIS Benchmark Level 1 applied as baseline via automation (Ansible, Chef, Puppet)
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.004
    text: CIS Benchmark compliance scan run; score reported in compliance dashboard
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.005
    text: 'Unnecessary services disabled: X11, Avahi, cups, rpcbind unless explicitly needed'
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.006
    text: Default and unused accounts disabled or removed
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.007
    text: Root login disabled for all remote access
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.008
    text: 'SSH hardened: key-only auth, PermitRootLogin no, MaxAuthTries 3'
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.009
    text: SSH AllowUsers / AllowGroups restricts access to named individuals
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.010
    text: Host-based firewall (ufw/firewalld/iptables) configured and active
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.011
    text: SELinux enforcing or AppArmor profiles applied to all services
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.012
    text: 'sysctl hardening: TCP SYN cookies, ICMP ignores, IP spoofing protection'
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.013
    text: File integrity monitoring (AIDE, Tripwire) on system binaries and configs
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.014
    text: 'auditd rules: login events, privilege escalation, file changes, exec calls'
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.015
    text: Umask set to 027 for new file creation
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.016
    text: SUID/SGID binaries audited; unnecessary bits removed
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.017
    text: 'Core dump restricted: fs.suid_dumpable=0'
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.018
    text: 'ASLR enabled: kernel.randomize_va_space=2'
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.019
    text: Compilers (gcc, g++) not installed on production servers
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.020
    text: NTP synchronization active; timezone set to UTC
  - id: PRC.OPERATING_SYSTEMS.SERVER_HARDENING_CIS_BENCHMARKS.021
    text: Log rotation configured for all log files
- id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT
  name: Patch Management
  items:
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.001
    text: 'Patch management system in place: AWS SSM Patch Manager, Ansible, or Puppet'
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.002
    text: 'Patch baseline: critical/security patches within 72h, others within 14 days'
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.003
    text: Patch compliance report reviewed weekly
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.004
    text: Patches tested in staging before production rollout
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.005
    text: Kernel live patching evaluated for zero-downtime security fixes
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.006
    text: Container base images rebuilt weekly with updated OS packages
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.007
    text: 'Vulnerability scanner post-patching: OpenSCAP, Qualys, or Tenable'
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.008
    text: 'End-of-life OS inventory tracked: no production systems on EOL OS'
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.009
    text: OS upgrade path defined and scheduled before EOL deadline
  - id: PRC.OPERATING_SYSTEMS.PATCH_MANAGEMENT.010
    text: Emergency patch process documented for critical CVEs (< 24h deployment)
- id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING
  name: Container OS & Kubernetes Node Hardening
  items:
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.001
    text: Container runtime updated to latest stable (containerd, CRI-O)
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.002
    text: Non-root user in all container images (USER directive in Dockerfile)
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.003
    text: 'Read-only root filesystem in all pods: readOnlyRootFilesystem: true'
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.004
    text: Privileged containers prohibited by admission policy
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.005
    text: Seccomp runtime/default profile applied to all pods
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.006
    text: AppArmor/SELinux profiles applied to all pods
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.007
    text: Host PID, IPC, network namespaces not shared by any pod
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.008
    text: 'Linux capabilities dropped to minimum: drop ALL, add only required'
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.009
    text: No secret values in environment variables (use Secrets Store CSI Driver)
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.010
    text: 'Image scanning in CI: Trivy, Grype, or Snyk Container; fails on CRITICAL CVE'
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.011
    text: Only images from approved registries allowed (admission controller policy)
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.012
    text: Images signed with Sigstore Cosign; signature verified on every pull
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.013
    text: Kubernetes node OS hardened per CIS Kubernetes Benchmark
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.014
    text: Kubernetes API server audit logging enabled and centralized
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.015
    text: etcd encrypted at rest; access restricted to API server only
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.016
    text: 'Kubernetes RBAC: least-privilege service accounts per Deployment'
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.017
    text: 'Pod Security Standards: restricted profile enforced in all production namespaces'
  - id: PRC.OPERATING_SYSTEMS.CONTAINER_OS_AND_KUBERNETES_NODE_HARDENING.018
    text: 'Network policies: default-deny per namespace; explicit allow between services'
- id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING
  name: Performance Tuning
  items:
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.001
    text: vm.swappiness=1 for DB servers, vm.swappiness=10 for app servers
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.002
    text: Swap disabled entirely for database servers
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.003
    text: 'File descriptor limits increased: fs.file-max, ulimits in limits.conf'
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.004
    text: 'TCP stack tuned: net.core.somaxconn, net.ipv4.tcp_max_syn_backlog'
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.005
    text: net.ipv4.tcp_tw_reuse=1 for TIME_WAIT recycling on high-connection-rate apps
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.006
    text: Transparent Huge Pages disabled for database servers (perf tuning for others)
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.007
    text: CPU governor set to performance mode for latency-sensitive workloads
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.008
    text: 'IRQ affinity: NIC interrupts spread across CPU cores'
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.009
    text: 'Disk I/O scheduler: none/mq-deadline for NVMe/SSD'
  - id: PRC.OPERATING_SYSTEMS.PERFORMANCE_TUNING.010
    text: Network interface ring buffer size increased for high-throughput services
