sections:
- id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION
  name: Research & Validation
  items:
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.001
    text: 'User research plan created: goals, questions, participants, timeline'
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.002
    text: At least 5 representative users interviewed for major new workflows
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.003
    text: Current-state workflow mapped before proposing a new solution
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.004
    text: User pain points ranked by frequency and severity
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.005
    text: Prototype tested before high-cost engineering work begins
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.006
    text: Usability test conducted with task completion rate measured
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.007
    text: Time-on-task and user confidence captured during usability tests
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.008
    text: Heuristic evaluation completed for major screens
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.009
    text: Competitive UX benchmark completed
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.010
    text: Accessibility needs considered during research phase, not after build
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.011
    text: Research findings summarized into clear design implications
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.RESEARCH_AND_VALIDATION.012
    text: Research repository maintained and linked from product decisions
- id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS
  name: Information Architecture & User Flows
  items:
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.001
    text: Sitemap or app map created for all primary navigation areas
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.002
    text: Primary user flows diagrammed from entry point to success state
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.003
    text: 'Alternate flows documented: cancellation, failure, retry, permission denied'
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.004
    text: First-run experience designed separately from returning-user experience
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.005
    text: Critical actions visually prioritized over secondary actions
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.006
    text: Destructive actions visually separated from routine actions
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.007
    text: Permission-based UI states designed for every role
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.008
    text: Empty states include explanation and next best action
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.009
    text: Error states include recovery path, not just failure message
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.010
    text: Microcopy reviewed for clarity, tone, and user confidence
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.011
    text: Localization expansion considered in layout and copy length planning
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.INFORMATION_ARCHITECTURE_AND_USER_FLOWS.012
    text: RTL layout implications considered if global audience planned
- id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA
  name: Design Handoff & QA
  items:
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.001
    text: Figma or design source of truth organized by feature and version
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.002
    text: Design components mapped to existing design system components
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.003
    text: New components added to design system before one-off implementation
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.004
    text: 'All design uses tokens: spacing, typography, color, shadows, motion'
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.005
    text: Responsive breakpoints specified for every major screen
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.006
    text: Hover, focus, active, disabled, loading, success, and error states all designed
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.007
    text: Design annotations explain behavior, not just visual appearance
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.008
    text: Copy finalized or marked as placeholder before engineering handoff
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.009
    text: Assets exported in correct formats and densities
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.010
    text: Design QA performed against implemented feature before release
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.011
    text: Visual regressions compared against approved design
  - id: PRC.UX_RESEARCH_AND_PRODUCT_DESIGN.DESIGN_HANDOFF_AND_QA.012
    text: Design debt logged when shipped differs from approved design
