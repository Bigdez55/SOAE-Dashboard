sections:
- id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT
  name: Architecture & State Management
  items:
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.001
    text: 'Rendering strategy decided: CSR, SSR, SSG, ISR, or hybrid with rationale in ADR'
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.002
    text: 'Data fetching: SWR or TanStack Query with stale-while-revalidate pattern'
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.003
    text: 'Global state vs server state clearly separated: never duplicate server state in global store'
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.004
    text: 'Form library: React Hook Form + Zod/Yup for validation'
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.005
    text: 'Routing: code splitting per route; no monolithic bundle'
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.006
    text: 'Hydration mismatch prevented on SSR/SSG: consistent client/server render'
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.007
    text: 'Bundle analyzer run: no unexpectedly large dependencies'
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.008
    text: 'Tree shaking verified: no dead code in production bundle'
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.009
    text: Optimistic UI updates for key user actions with rollback on failure
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.010
    text: Request deduplication for parallel fetches to same URL
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.011
    text: Stale data refresh in background without blocking UI
  - id: PRC.FRONTEND.ARCHITECTURE_AND_STATE_MANAGEMENT.012
    text: Module federation evaluated for micro-frontend architectures
- id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM
  name: Component Architecture & Design System
  items:
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.001
    text: 'Design system documented: tokens, components, usage guidelines, do/don''ts'
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.002
    text: 'Design tokens in CSS custom properties: colors, spacing, typography, shadows'
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.003
    text: Component library in Storybook with all components documented
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.004
    text: Every component tested in isolation in Storybook
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.005
    text: Atomic design or feature-sliced design applied consistently
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.006
    text: Error boundaries at route level and around unstable third-party components
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.007
    text: Suspense boundaries for async data and lazy-loaded components
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.008
    text: React.memo, useMemo, useCallback applied only where profiling shows benefit
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.009
    text: No prop drilling beyond 2 levels
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.010
    text: Component composition over inheritance everywhere
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.011
    text: Empty state, loading state, and error state defined for every data-driven component
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.012
    text: Skeleton screens for all loading states; never blank white flash
  - id: PRC.FRONTEND.COMPONENT_ARCHITECTURE_AND_DESIGN_SYSTEM.013
    text: Accessibility props (aria-*) exposed on all design system components
- id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD
  name: Styling, Theming & Build
  items:
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.001
    text: 'CSS methodology chosen and applied consistently: CSS Modules, Tailwind, or CSS-in-JS'
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.002
    text: No inline styles except for dynamic computed values
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.003
    text: Design tokens as CSS custom properties for live theming
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.004
    text: 'Dark/light mode: follows system preference, user override stored in profile'
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.005
    text: Color contrast verified across all theme variants
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.006
    text: 'Responsive breakpoints defined: mobile-first CSS approach'
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.007
    text: CSS container queries for component-level responsive design
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.008
    text: prefers-reduced-motion respected in all CSS animations
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.009
    text: 'GPU-accelerated animations only: transform and opacity, never layout properties'
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.010
    text: 'Print stylesheet created: removes nav, preserves content'
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.011
    text: RTL layout tested if serving Arabic, Hebrew, or Farsi users
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.012
    text: Build tool (Vite, webpack, Turbopack) configured with optimal production settings
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.013
    text: Source maps generated for production (hosted privately, not publicly served)
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.014
    text: Asset fingerprinting (content hash in filename) for long-term caching
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.015
    text: 'Lighthouse CI in pipeline: performance, a11y, best-practices, SEO all > 90'
  - id: PRC.FRONTEND.STYLING_THEMING_AND_BUILD.016
    text: 'Bundle size budget enforced: fail CI at +10% increase from baseline'
- id: PRC.FRONTEND.TESTING_AND_PWA
  name: Testing & PWA
  items:
  - id: PRC.FRONTEND.TESTING_AND_PWA.001
    text: Unit tests for all utility functions, hooks, and pure business logic
  - id: PRC.FRONTEND.TESTING_AND_PWA.002
    text: 'Component tests with React Testing Library: test user behavior, not implementation'
  - id: PRC.FRONTEND.TESTING_AND_PWA.003
    text: Component tests cover loading, error, empty, and data states
  - id: PRC.FRONTEND.TESTING_AND_PWA.004
    text: 'Visual regression tests: Chromatic, Percy, or Playwright screenshots'
  - id: PRC.FRONTEND.TESTING_AND_PWA.005
    text: E2E tests with Playwright covering all critical user journeys
  - id: PRC.FRONTEND.TESTING_AND_PWA.006
    text: E2E tests run against staging before each production deployment
  - id: PRC.FRONTEND.TESTING_AND_PWA.007
    text: 'Accessibility tests automated: axe-core in component tests and E2E'
  - id: PRC.FRONTEND.TESTING_AND_PWA.008
    text: 'Cross-browser matrix: Chrome, Firefox, Safari, Edge'
  - id: PRC.FRONTEND.TESTING_AND_PWA.009
    text: 'Mobile browser testing: iOS Safari and Android Chrome'
  - id: PRC.FRONTEND.TESTING_AND_PWA.010
    text: Dark mode tested in all E2E test suites
  - id: PRC.FRONTEND.TESTING_AND_PWA.011
    text: 'Performance regression: Lighthouse CI budget enforced in CI'
  - id: PRC.FRONTEND.TESTING_AND_PWA.012
    text: 'Network throttling tested: core functionality usable on simulated 3G'
  - id: PRC.FRONTEND.TESTING_AND_PWA.013
    text: 'Error boundary behavior tested: renders fallback on component crash'
  - id: PRC.FRONTEND.TESTING_AND_PWA.014
    text: 'Web app manifest complete: icons, theme, display, start_url'
  - id: PRC.FRONTEND.TESTING_AND_PWA.015
    text: 'Service worker: cache-first for assets, network-first for API calls'
  - id: PRC.FRONTEND.TESTING_AND_PWA.016
    text: 'Offline shell: app usable for core features without network'
  - id: PRC.FRONTEND.TESTING_AND_PWA.017
    text: PWA installability passing Lighthouse PWA audit
- id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY
  name: Advanced Rendering & Edge Delivery
  items:
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.001
    text: 'Rendering strategy per route deliberate: SSR, SSG, ISR, streaming, or client-only'
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.002
    text: Streaming SSR used to improve TTFB and progressive rendering where beneficial
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.003
    text: React Server Components or islands architecture evaluated to cut client JS
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.004
    text: Partial hydration / selective hydration to reduce main-thread work
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.005
    text: Edge rendering evaluated for global low-latency HTML
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.006
    text: Hydration mismatches eliminated (consistent server/client output)
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.007
    text: Suspense and streaming boundaries placed to optimize perceived performance
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.008
    text: Above-the-fold prioritized; below-the-fold deferred or lazily hydrated
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.009
    text: Data fetching colocated and waterfalls eliminated (parallel fetches)
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.010
    text: ISR/revalidation strategy avoids serving long-stale content
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.011
    text: Personalization handled without breaking CDN cacheability
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.012
    text: Skeleton and streamed placeholders prevent layout shift during load
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.013
    text: Route-based and component-based code splitting verified
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.014
    text: Critical CSS inlined; non-critical CSS deferred
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.015
    text: Resource hints (preload, modulepreload, preconnect) for critical assets
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.016
    text: Third-party script impact on rendering measured and contained
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.017
    text: RUM confirms field rendering metrics meet targets across devices
  - id: PRC.FRONTEND.ADVANCED_RENDERING_AND_EDGE_DELIVERY.018
    text: 'Progressive enhancement: core content usable without JS where feasible'
