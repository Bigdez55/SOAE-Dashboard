    text: Processing runs asynchronously off the request path
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MEDIA_PROCESSING_PIPELINE.006
    text: Processing jobs idempotent and retryable
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MEDIA_PROCESSING_PIPELINE.007
    text: Processing failures handled with dead-letter and alerting
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MEDIA_PROCESSING_PIPELINE.008
    text: Large-file and long-running transcode timeouts handled
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MEDIA_PROCESSING_PIPELINE.009
    text: Processing pipeline autoscales with upload volume
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MEDIA_PROCESSING_PIPELINE.010
    text: Original retained or re-derivable; derivatives regenerable
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MEDIA_PROCESSING_PIPELINE.011
    text: Watermarking applied where required
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MEDIA_PROCESSING_PIPELINE.012
    text: Processing cost (CPU/GPU) modeled and monitored
