  name: Storage, Delivery & Resilience
  items:
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.STORAGE_DELIVERY_AND_RESILIENCE.001
    text: Media stored in object storage with versioning where needed
