sections:
- id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION
  name: Upload Security & Validation
  items:
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.001
    text: File size limits enforced server-side, not only client-side
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.002
    text: Allowed file types validated by content (magic bytes), not just extension or MIME header
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.003
    text: Filename sanitized to prevent path traversal and injection
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.004
    text: Uploaded files stored outside the web root or in object storage
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.005
    text: Files served with safe Content-Type and Content-Disposition headers
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.006
    text: Executable and script uploads blocked or neutralized
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.007
    text: Image and document parsing hardened against malicious payloads (e.g., decompression bombs)
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.008
    text: SVG sanitized to strip embedded scripts
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.009
    text: Upload endpoints authenticated and authorized
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.010
    text: Direct-to-storage uploads use scoped, short-lived presigned URLs
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.011
    text: Upload rate limiting and quota per user/tenant
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.UPLOAD_SECURITY_AND_VALIDATION.012
    text: Metadata stored separately from file content with integrity checks
- id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING
  name: Malware & Content Scanning
  items:
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.001
    text: Malware scanning on all uploaded files (ClamAV, vendor AV, cloud scanning)
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.002
    text: Files quarantined until scan completes before being served
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.003
    text: Content moderation scanning for images/video where user-facing (see T&S category)
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.004
    text: CSAM scanning where applicable (see Trust & Safety category)
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.005
    text: Decompression bomb and nested-archive limits enforced
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.006
    text: Polyglot file detection (file valid as multiple types)
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.007
    text: EXIF and sensitive metadata stripped from public images
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.008
    text: PDF and Office documents scanned for active content / macros
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.009
    text: Scan failures fail closed (file not served) with alerting
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.010
    text: Re-scan capability when signatures update
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.011
    text: Scan results logged and auditable
  - id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MALWARE_AND_CONTENT_SCANNING.012
    text: Quarantine and remediation workflow defined
- id: PRC.FILE_UPLOAD_AND_MEDIA_PROCESSING.MEDIA_PROCESSING_PIPELINE
  name: Media Processing Pipeline
