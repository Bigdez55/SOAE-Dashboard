sections:
- id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP
  name: Structure & Ownership
  items:
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.001
    text: Monorepo vs polyrepo decision documented in ADR
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.002
    text: 'Monorepo tooling configured if applicable: Nx, Turborepo, Bazel, or Lerna'
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.003
    text: Folder structure mirrors domain/team ownership, not tech layer
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.004
    text: /apps or /services for runnable applications
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.005
    text: /packages or /libs for shared libraries
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.006
    text: /infra or /terraform for infrastructure code
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.007
    text: /docs for ADRs, runbooks, architecture documentation
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.008
    text: 'CODEOWNERS: every directory has a named owner (team or individual)'
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.009
    text: 'CODEOWNERS enforced: owner approval required for their paths in CI'
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.010
    text: 'Top-level README: project map, quick start guide, links to key documentation'
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.011
    text: Service catalog entry exists for every active repository
  - id: PRC.REPOSITORY_ORGANIZATION.STRUCTURE_AND_OWNERSHIP.012
    text: Abandoned/archived repos clearly marked, excluded from active work
- id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW
  name: Branching & PR Workflow
  items:
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.001
    text: 'Branching model documented: trunk-based development preferred for CI/CD'
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.002
    text: 'Default branch (main) protected: direct push disabled'
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.003
    text: 'Branch naming convention: feat/TICKET-description, fix/, chore/, hotfix/'
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.004
    text: Feature branches merged within 2 working days (short-lived branches)
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.005
    text: Feature flags enable trunk-based development (code merged but inactive)
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.006
    text: Force push prohibited on all protected branches
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.007
    text: 'Merge strategy defined: squash for features, merge commits for releases'
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.008
    text: 'Branch cleanup automated: merged branches deleted automatically'
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.009
    text: 'PR template: summary, motivation, test plan, screenshots, checklist'
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.010
    text: 'PR size guideline: < 400 lines changed; automation warns above threshold'
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.011
    text: 'Required reviewers: CODEOWNERS auto-assigned, minimum 1-2 approvals'
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.012
    text: Required CI status checks must pass before any merge
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.013
    text: 'PR review SLA defined: 48 business hours maximum'
  - id: PRC.REPOSITORY_ORGANIZATION.BRANCHING_AND_PR_WORKFLOW.014
    text: Stale PR notifications automated after 7 days of inactivity
- id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY
  name: Commit Standards & Supply Chain Security
  items:
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.001
    text: 'Conventional Commits enforced in CI (commitlint): feat, fix, chore, docs, refactor, test, ci'
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.002
    text: Commit message body explains WHY, not just WHAT
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.003
    text: Semantic versioning automated from Conventional Commits (semantic-release)
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.004
    text: CHANGELOG auto-generated per release
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.005
    text: GitHub/GitLab Releases with release notes and artifacts on every tag
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.006
    text: 'Secret scanning enabled: GitHub Advanced Security, GitGuardian, or truffleHog'
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.007
    text: Historical secret scan run on full repo history once
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.008
    text: 'No secrets committed: enforced via pre-commit hook and CI gate'
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.009
    text: 'Dependency vulnerability scanning on every PR: Dependabot or Snyk'
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.010
    text: 'SAST scanning on every PR: Semgrep, CodeQL, or Checkmarx'
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.011
    text: License compliance scanning automated on every PR
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.012
    text: SBOM generated and attached to every release
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.013
    text: 'SLSA provenance level 2+: builds happen in CI, not on developer machine'
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.014
    text: 'Container images signed on every release: Sigstore/Cosign'
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.015
    text: Third-party CI actions/orbs pinned to full commit SHA, never floating tags
  - id: PRC.REPOSITORY_ORGANIZATION.COMMIT_STANDARDS_AND_SUPPLY_CHAIN_SECURITY.016
    text: Release managers use GPG-signed commits
