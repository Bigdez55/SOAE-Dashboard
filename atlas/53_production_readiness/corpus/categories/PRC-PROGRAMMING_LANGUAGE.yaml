sections:
- id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES
  name: Toolchain & Dependencies
  items:
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.001
    text: 'Runtime/compiler version pinned: .nvmrc, .tool-versions, go.mod, Cargo.toml'
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.002
    text: Version manager enforced in CI and dev machines (nvm, pyenv, asdf, rbenv)
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.003
    text: 'Package manager lockfile committed: package-lock.json, poetry.lock, go.sum, Cargo.lock'
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.004
    text: Private package registry for internal packages
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.005
    text: 'Dependency vulnerability scanning automated: npm audit, pip-audit, cargo audit, Snyk'
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.006
    text: Dependency update PRs automated (Dependabot, Renovate) with CI gate
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.007
    text: 'License compliance scanning: all dependencies permitted by org policy'
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.008
    text: SBOM generated on every release build
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.009
    text: No abandoned dependencies without vetted alternatives
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.010
    text: Peer dependency conflicts resolved; no silent version mismatches
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.011
    text: 'Supply chain: npm/pip packages verified; no typosquatting risk'
  - id: PRC.PROGRAMMING_LANGUAGE.TOOLCHAIN_AND_DEPENDENCIES.012
    text: Third-party actions/orbs pinned to full commit SHA in CI pipelines
- id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS
  name: Code Quality & Static Analysis
  items:
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.001
    text: 'SAST tool in CI: SonarQube, CodeClimate, Semgrep, or CodeQL'
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.002
    text: 'Compiler warnings treated as errors in CI: -Werror, -Wall, strict mode'
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.003
    text: 'Type checking strictly enforced: TypeScript strict:true, mypy, pyright, Rust borrow checker'
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.004
    text: Cyclomatic complexity limit enforced (max 10 per function)
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.005
    text: Function/method line limit enforced (max 50 lines recommended)
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.006
    text: Duplicate code detection (jscpd, CPD) with low tolerance (< 5%)
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.007
    text: Unused code, imports, and variables flagged as errors
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.008
    text: Docstring/JSDoc required on all public APIs
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.009
    text: Architecture fitness functions written and validated in CI
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.010
    text: Dependency direction rules enforced; no circular dependencies
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.011
    text: Magic numbers replaced with named constants
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.012
    text: 'Error handling never silenced: no bare catch{}, no _ = err'
  - id: PRC.PROGRAMMING_LANGUAGE.CODE_QUALITY_AND_STATIC_ANALYSIS.013
    text: 'Code review checklist covers: correctness, tests, security, performance, docs'
- id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL
  name: Security Hardening at Language Level
  items:
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.001
    text: 'Integer overflow/underflow: checked arithmetic or safe math libraries used'
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.002
    text: 'Buffer overflow protections: bounds checking enabled; no raw pointer arithmetic without review'
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.003
    text: Memory-safe language used, or ASAN/MSAN/TSAN sanitizers active (C/C++)
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.004
    text: Fuzzing configured for all input-parsing and deserialization code
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.005
    text: Fuzzing runs in CI on PRs touching parsers or network-facing deserialization
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.006
    text: 'Deserialization of untrusted data: safe deserializers only; no Java serialization or pickle'
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.007
    text: 'Path traversal prevention: all file paths sanitized against traversal sequences'
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.008
    text: ReDoS-vulnerable regex audited; re2-safe library or timeout used
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.009
    text: No eval() or exec() on any user-controlled input
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.010
    text: Prototype pollution prevention in JavaScript (Object.create(null), Object.freeze)
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.011
    text: Timing-safe comparison for all secret/token comparisons (hmac.Equal, crypto.timingSafeEqual)
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.012
    text: 'Compiler hardening flags: -fstack-protector-strong, -D_FORTIFY_SOURCE, PIE, RELRO'
  - id: PRC.PROGRAMMING_LANGUAGE.SECURITY_HARDENING_AT_LANGUAGE_LEVEL.013
    text: No dynamic code generation from user input
- id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING
  name: Performance, Benchmarking & Profiling
  items:
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.001
    text: Benchmarks written for all performance-critical code paths
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.002
    text: Benchmarks run in CI to detect regressions automatically
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.003
    text: 'Profiling tools configured: pprof, py-spy, async-profiler, or Clinic.js'
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.004
    text: CPU profiling run under realistic production-like load
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.005
    text: 'Memory profiling: heap growth and GC pressure measured'
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.006
    text: Allocations per request measured and minimized on hot code paths
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.007
    text: Goroutine/thread/fiber leak detection tooling active in CI
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.008
    text: Event loop blocking detection for Node.js
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.009
    text: Object pooling for high-allocation hot paths
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.010
    text: String building via builder pattern, not concatenation in loops
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.011
    text: 'GC tuning: JVM GOMAXPROCS, GC flags tuned for container workloads'
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.012
    text: 'Serialization format benchmarked per use case: JSON vs Protobuf vs MessagePack'
  - id: PRC.PROGRAMMING_LANGUAGE.PERFORMANCE_BENCHMARKING_AND_PROFILING.013
    text: Database query time measured per request; slow query thresholds alerted
