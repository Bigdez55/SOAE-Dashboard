capability_notes: BUILT + probe-verified WIRED (probe_audit_wired → verify_audit_log.mjs VERIFY_OK; SHA-256 hash-chained row appended, prev_hash linked). guards.auditRequest wires the immutable audit engine into the 6 mutating routes.
sections:
- id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN
  name: Audit Trail Design
  items:
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.001
    text: Audit log separate from application/debug logs
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.002
    text: Every security- and compliance-relevant action audited
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.003
    text: Audit records capture who, what, when, where (IP), and why (reason/context)
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.004
    text: Actor identity captured for both human and service actions
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.005
    text: Before and after state captured for sensitive changes
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.006
    text: Admin and privileged actions always audited
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.007
    text: 'Authentication events audited: login, logout, MFA, failures'
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.008
    text: 'Authorization changes audited: role/permission grants and revocations'
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.009
    text: Data access to sensitive records audited
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.010
    text: Configuration and feature-flag changes audited
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.011
    text: Audit events emitted reliably (not best-effort) for critical actions
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.AUDIT_TRAIL_DESIGN.012
    text: Audit schema standardized and versioned
- id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY
  name: Tamper-Evidence & Integrity
  items:
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.001
    text: Audit logs append-only and immutable
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.002
    text: Tamper-evidence via hash chaining or cryptographic signing
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.003
    text: Write access to audit storage strictly limited
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.004
    text: Audit log deletion prevented or requires multi-party approval
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.005
    text: Audit logs stored separately from the systems they record
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.006
    text: Time source trusted and synchronized (NTP) for accurate timestamps
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.007
    text: Audit log integrity verified periodically
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.008
    text: Audit pipeline failures alerted (gaps in audit are incidents)
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.009
    text: Audit logs encrypted at rest and in transit
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.010
    text: Audit access itself audited (who read the audit log)
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.011
    text: Clock skew handled to preserve event ordering
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.TAMPER_EVIDENCE_AND_INTEGRITY.012
    text: Audit completeness validated against expected event volume
- id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM
  name: Retention, Access & SIEM
  items:
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.001
    text: Audit retention period meets regulatory and contractual requirements
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.002
    text: 'Retention tiers: hot for recent, cold/archive for older'
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.003
    text: Audit logs queryable for investigation and reporting
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.004
    text: Customer-facing audit log export for enterprise tenants
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.005
    text: Audit logs forwarded to SIEM for correlation and alerting
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.006
    text: Role-based access to audit logs (least privilege)
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.007
    text: PII in audit logs minimized and protected
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.008
    text: Audit log search performance acceptable at scale
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.009
    text: Per-tenant audit scoping and isolation
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.010
    text: Audit data lifecycle and deletion policy documented
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.011
    text: Audit storage cost monitored
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.RETENTION_ACCESS_AND_SIEM.012
    text: Audit log availability SLO defined
- id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY
  name: Forensics, Legal Hold & eDiscovery
  items:
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.001
    text: 'Incident forensics process defined: collect, preserve, analyze, report'
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.002
    text: Chain of custody maintained for evidence
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.003
    text: Legal hold process freezes relevant data from deletion
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.004
    text: Legal hold overrides normal retention/deletion automatically
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.005
    text: eDiscovery export in defensible, complete format
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.006
    text: Forensic timeline reconstruction possible from logs
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.007
    text: Data sources for investigation inventoried (logs, audit, backups)
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.008
    text: Breach investigation playbook references available evidence
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.009
    text: Law enforcement request handling with legal review and logging
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.010
    text: Forensic readiness reviewed and tested periodically
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.011
    text: Investigation access tightly controlled and itself audited
  - id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY.FORENSICS_LEGAL_HOLD_AND_EDISCOVERY.012
