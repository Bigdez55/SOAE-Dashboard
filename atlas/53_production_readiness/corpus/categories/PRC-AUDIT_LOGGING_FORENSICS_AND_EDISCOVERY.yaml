schema_version: '1.0'
category_id: PRC.AUDIT_LOGGING_FORENSICS_AND_EDISCOVERY
name: Audit Logging, Forensics & eDiscovery
icon: ⊨
color: '#FC8181'
default_severity: high
coverage_status: FULL
skill_refs:
- SKILL_AUDIT_LOG_IMMUTABLE_001
- SKILL_PROOF_MATRIX_001
- SKILL_AUDIT_ASSESS_ANALYZE_001
