sections:
- id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT
  name: i18n Architecture & Text
  items:
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.001
    text: 'i18n library selected: react-intl, i18next, FormatJS, or native Intl API'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.002
    text: All user-visible strings externalized; no hardcoded strings in templates
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.003
    text: 'Translation keys: descriptive namespaced format (settings.profile.title)'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.004
    text: Translation files organized by feature/namespace, not one large file
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.005
    text: Pluralization handled per language rules (not just singular/plural binary)
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.006
    text: Gender-specific strings handled per target language requirements
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.007
    text: 'String interpolation uses named placeholders: {userName} not %s'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.008
    text: HTML in translations handled safely (no XSS via translation strings)
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.009
    text: 'Missing translation fallback: falls back to source language string'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.010
    text: 'Locale detection: browser language → user preference → org setting → default'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.011
    text: Locale stored in user profile and persists across sessions
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.012
    text: 'Server-side locale: API accepts and respects Accept-Language header'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.013
    text: 'Character encoding UTF-8 everywhere: database, API, file storage'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.I18N_ARCHITECTURE_AND_TEXT.014
    text: 'Fonts cover all required character sets: CJK, Arabic, Devanagari as needed'
- id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT
  name: Locale Data & RTL Support
  items:
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.001
    text: 'Date formatting: Intl.DateTimeFormat per locale'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.002
    text: 'Time format: 12h vs 24h per locale'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.003
    text: All timestamps stored UTC; displayed in user's local timezone
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.004
    text: 'Number formatting: decimal separator and thousands separator per locale'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.005
    text: 'Currency formatting: symbol position, decimal places per locale'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.006
    text: Phone number formatting uses libphonenumber per country
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.007
    text: Address formatting flexible enough to handle country-specific schemas
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.008
    text: 'Name order: given name vs family name first varies by culture'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.009
    text: 'Sorting: Intl.Collator used for locale-aware string sorting'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.010
    text: 'Relative time: Intl.RelativeTimeFormat for ''yesterday'', ''3 days ago'''
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.011
    text: RTL layout for Arabic (ar), Hebrew (he), Farsi (fa), Urdu (ur)
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.012
    text: CSS logical properties used (margin-inline-start) instead of left/right
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.013
    text: Flexbox direction reverses in RTL; tested with real Arabic/Hebrew text
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.014
    text: Directional icons (back arrows, checkmarks) mirrored in RTL
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.015
    text: Third-party components verified for RTL support
  - id: PRC.INTERNATIONALIZATION_AND_L10N.LOCALE_DATA_AND_RTL_SUPPORT.016
    text: Mixed LTR/RTL content handled (English names in Arabic UI)
- id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW
  name: Translation Workflow
  items:
  - id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW.001
    text: 'Translation management system: Lokalise, Phrase, or Crowdin'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW.002
    text: 'Translators have context: screenshots or component previews alongside strings'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW.003
    text: 'Pseudo-localization in dev: strings expanded 40% to catch layout overflow'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW.004
    text: 'Missing translation CI check: build fails if new strings not in all active locales'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW.005
    text: Machine translation (DeepL, Google Translate) for initial draft; reviewed by human
  - id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW.006
    text: 'Cultural review: appropriateness beyond literal translation checked'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW.007
    text: 'Legal text localized per jurisdiction: terms, privacy policy'
  - id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW.008
    text: Support documentation localized for each supported language
  - id: PRC.INTERNATIONALIZATION_AND_L10N.TRANSLATION_WORKFLOW.009
    text: 'Translation status tracked per locale: % complete dashboard'
