schema_version: '1.0'
category_id: PRC.DATABASE
name: Database
icon: ⬡
color: '#FF6B35'
default_severity: medium
coverage_status: FULL
skill_refs:
- SKILL_AZURE_POSTGRES_001
- SKILL_DATA_ISOLATION_STORAGE_001
- SKILL_AZURE_STORAGE_001
- SKILL_ELSON_SCHEMA_CHECK_001
capability_status: PARTIAL
tool_refs: []
mcp_refs: []
command_refs: []
capability_refs: []
capability_notes: Durable Drizzle SQLite client + runMigrations (desktop) are wired; hosted Postgres dialect (schema.pg.ts) is NOT built so the write path is desktop-only. Build the hosted driver/migrations to reach HAVE.
sections:
- id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY
  name: Schema Design & Integrity
  items:
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.001
    text: Entity-Relationship (ER) diagram version-controlled in /docs
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.002
    text: Database schema fully documented in schema registry or data catalog
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.003
    text: Normalization applied (3NF/BCNF) or denormalization justified in ADR
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.004
    text: Primary keys on all tables; never using business data as PK
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.005
    text: UUID vs sequential ID strategy decided and documented
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.006
    text: Foreign keys enforced at DB level for referential integrity
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.007
    text: NOT NULL constraints on all columns that should never be null
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.008
    text: DEFAULT values set to avoid null surprises
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.009
    text: CHECK constraints for domain-constrained columns
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.010
    text: UNIQUE constraints on all business-unique columns
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.011
    text: 'Naming conventions enforced: snake_case, descriptive, no abbreviations'
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.012
    text: 'Soft delete strategy: deleted_at timestamp vs hard delete vs status column'
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.013
    text: 'Audit columns on important tables: created_at, updated_at, created_by, updated_by'
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.014
    text: All timestamps stored in UTC; timezone strategy documented
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.015
    text: 'Multi-tenancy strategy: shared DB vs schema-per-tenant vs DB-per-tenant'
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.016
    text: ENUM vs lookup table decision documented
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.017
    text: 'JSON/JSONB columns: schema defined and validated at application layer'
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.018
    text: 'Data type precision: INT vs BIGINT, VARCHAR(n) vs TEXT chosen deliberately'
  - id: PRC.DATABASE.SCHEMA_DESIGN_AND_INTEGRITY.019
    text: Polymorphic association trade-offs documented; avoided where possible
- id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE
  name: Indexing & Query Performance
  items:
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.001
    text: Indexes on all foreign key columns
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.002
    text: Composite indexes designed to match actual WHERE/ORDER BY query patterns
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.003
    text: Covering indexes for high-frequency read queries
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.004
    text: Partial indexes for sparse/filtered queries
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.005
    text: Full-text search indexes (GIN/GiST for Postgres, FULLTEXT for MySQL)
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.006
    text: 'EXPLAIN ANALYZE run on every slow query: no full table scans on large tables'
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.007
    text: Slow query log enabled and monitored (threshold ≥ 100ms)
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.008
    text: All N+1 query patterns identified and eliminated
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.009
    text: Cursor-based pagination for large result sets (not OFFSET on large pages)
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.010
    text: Query timeout set at connection level; prevents runaway queries
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.011
    text: Index usage analyzed; unused indexes removed
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.012
    text: Index bloat monitored; REINDEX scheduled when needed
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.013
    text: Query plans reviewed after schema or significant data volume changes
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.014
    text: 'Read vs write queries separated: read replicas for reporting and read-heavy queries'
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.015
    text: Statistics target tuned for skewed column distributions
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.016
    text: Connection pool min/max configured; pool exhaustion alerts active
  - id: PRC.DATABASE.INDEXING_AND_QUERY_PERFORMANCE.017
    text: Autovacuum/ANALYZE activity monitored; dead tuple count tracked (Postgres)
- id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION
  name: High Availability & Replication
  items:
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.001
    text: Primary + replica replication configured (streaming, logical, or semi-sync)
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.002
    text: Replication lag monitored; alert at 30s, critical at 60s
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.003
    text: Replica promotion runbook written and tested
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.004
    text: 'Automatic failover configured: Patroni, RDS Multi-AZ, PlanetScale, or Galera'
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.005
    text: Application reads from replica pool; writes only to primary
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.006
    text: Connection pooler (PgBouncer, ProxySQL) handles failover transparently
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.007
    text: Multi-region cross-region replica for DR
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.008
    text: Synchronous vs asynchronous replication trade-off documented
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.009
    text: Connection string uses DNS alias for seamless failover
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.010
    text: Health checks on DB load balancer
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.011
    text: Read replica count scales with read traffic growth
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.012
    text: Cascading replica for analytics workloads (does not impact primary)
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.013
    text: 'Database failover tested: RTO measured and meets SLO'
  - id: PRC.DATABASE.HIGH_AVAILABILITY_AND_REPLICATION.014
    text: 'Split-brain scenario: conflict resolution strategy documented'
- id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING
  name: Migrations & Versioning
  items:
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.001
    text: 'Migration tool enforced: Flyway, Liquibase, Alembic, Knex, or Rails'
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.002
    text: All schema changes via migrations; zero manual DDL in production
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.003
    text: Migrations are idempotent where possible
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.004
    text: Forward and rollback migration scripts for every change
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.005
    text: Migrations tested in staging with production-scale data volumes
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.006
    text: 'Large table migrations use online DDL: pt-osc, gh-ost, or pg_repack'
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.007
    text: 'Zero-downtime migration pattern: add-column → deploy → backfill → not-null'
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.008
    text: 'Lock-free index creation: CREATE INDEX CONCURRENTLY'
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.009
    text: Migration execution time measured and bounded
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.010
    text: 'Schema drift detection: production schema matches migration history'
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.011
    text: Seed and reference data scripts versioned alongside migrations
  - id: PRC.DATABASE.MIGRATIONS_AND_VERSIONING.012
    text: Database version and migration state pinned in deploy pipeline
- id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY
  name: Backup, Recovery & Security
  items:
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.001
    text: 'Automated backups: daily full, hourly incremental minimum'
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.002
    text: Point-in-time recovery (PITR) enabled; retention period defined
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.003
    text: Backups stored in separate account/region from primary database
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.004
    text: Backup restoration tested monthly; not just backup creation
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.005
    text: RTO and RPO defined per database tier
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.006
    text: DR runbook with exact restoration steps written and rehearsed
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.007
    text: Backup encryption enabled (AES-256 or better)
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.008
    text: Backup integrity checksums verified after creation
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.009
    text: Backup retention policy compliant with regulatory requirements
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.010
    text: Application never connects as root/superuser
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.011
    text: 'Least-privilege DB users: separate user per service with minimal grants'
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.012
    text: Read-only user for analytics and reporting tools
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.013
    text: Database not publicly accessible (inside VPC, private subnet only)
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.014
    text: 'Encryption at rest enabled: TDE or encrypted storage volumes'
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.015
    text: 'Encryption in transit enforced: TLS required, reject non-TLS connections'
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.016
    text: 'SQL injection prevention: parameterized queries everywhere without exception'
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.017
    text: 'Database audit logging: DDL changes, privileged activity, sensitive table access'
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.018
    text: PII columns encrypted at application layer beyond DB-level encryption
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.019
    text: DB credentials rotated automatically via secrets manager
  - id: PRC.DATABASE.BACKUP_RECOVERY_AND_SECURITY.020
    text: DB access reviewed quarterly; revoked for offboarded engineers
- id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH
  name: Monitoring & Operational Health
  items:
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.001
    text: CPU, memory, disk I/O, IOPS monitored with baselines and trend charts
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.002
    text: Disk space alert at 70%, critical at 85%
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.003
    text: Active connections monitored vs max_connections limit
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.004
    text: Lock wait and deadlock events monitored and alerted
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.005
    text: 'Long-running transaction alert: > 30s for OLTP, > 5min for analytics'
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.006
    text: Table and index bloat monitored; growth trend tracked
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.007
    text: Cache/buffer hit ratio monitored (target > 99% for OLTP workloads)
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.008
    text: Transaction throughput (TPS) and latency (p95, p99) tracked
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.009
    text: Replication lag dashboard visible to ops team at all times
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.010
    text: WAL/binlog disk usage monitored
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.011
    text: DB error log tailed; alert on ERROR and FATAL severity
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.012
    text: 'Capacity planning: storage growth projected 6 months ahead'
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.013
    text: Sharding/partitioning strategy triggered when table exceeds size threshold
  - id: PRC.DATABASE.MONITORING_AND_OPERATIONAL_HEALTH.014
    text: Connection pool utilization monitored; exhaustion alerts configured
- id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE
  name: Sharding, Partitioning & Scale
  items:
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.001
    text: Vertical scaling limits understood before committing to sharding
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.002
    text: 'Partitioning strategy chosen: range, hash, or list, with rationale'
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.003
    text: Time-based partitioning for time-series and append-heavy tables
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.004
    text: Shard key chosen to distribute load evenly and avoid hotspots
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.005
    text: Cross-shard query strategy defined (scatter-gather minimized)
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.006
    text: Resharding and rebalancing plan documented and tested
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.007
    text: Distributed transactions across shards avoided or carefully managed
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.008
    text: Read/write splitting routes reads to replicas, writes to primary
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.009
    text: Connection pooler/proxy (PgBouncer, ProxySQL, RDS Proxy) in front of DB
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.010
    text: Materialized views for expensive aggregations, with refresh strategy
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.011
    text: Partition pruning verified in query plans
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.012
    text: Old partitions archived or dropped on a schedule
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.013
    text: Hot partition and hot shard detection and mitigation
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.014
    text: Global secondary indexes considered for access patterns across shards
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.015
    text: Foreign keys and constraints strategy under partitioning documented
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.016
    text: Capacity model projects when the next shard or partition is needed
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.017
    text: Vacuum/maintenance tuned per partition for large tables
  - id: PRC.DATABASE.SHARDING_PARTITIONING_AND_SCALE.018
    text: Sharding-aware backups and restores tested
