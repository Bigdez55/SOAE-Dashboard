- id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY
  name: Email Infrastructure & Deliverability
  items:
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.001
    text: 'Transactional email provider: SendGrid, Postmark, AWS SES, or Mailgun'
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.002
    text: Marketing email on separate sending domain and IP from transactional
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.003
    text: Custom sending domain configured (email.myapp.com, not provider default)
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.004
    text: Dedicated IP for high-volume sending; warm-up plan executed
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.005
    text: SPF record includes all sending sources
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.006
    text: 'DKIM configured: 2048-bit RSA key per sending domain'
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.007
    text: DMARC policy progressed to p=reject after monitoring period
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.008
    text: DMARC reporting email monitored for failures
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.009
    text: 'Bounce handling: hard bounces suppress future sends automatically'
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.010
    text: 'Complaint handling: FBL reports trigger automatic unsubscribe'
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.011
    text: 'Unsubscribe: one-click and List-Unsubscribe header in all marketing emails'
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.012
    text: Marketing opt-in verified before any marketing emails sent (GDPR)
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.013
    text: Suppression list maintained and respected across all sends
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.014
    text: Email volume caps prevent accidental mass send
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.015
    text: 'Sender reputation monitored: Google Postmaster Tools, SNDS'
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.016
    text: Spam score checked on all templates (SpamAssassin, Mail Tester)
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.017
    text: 'Blacklist monitoring: IP and domain checked daily'
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.018
    text: 'Transactional email delivery latency monitored: target < 30 seconds'
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_INFRASTRUCTURE_AND_DELIVERABILITY.019
    text: Alert on delivery failure rate > 5% or spam complaint rate > 0.1%
