    text: Push notification permission requested with value proposition context
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_TEMPLATES_AND_NOTIFICATIONS.014
    text: 'Notification content: clear title, useful body, relevant deep-link action'
