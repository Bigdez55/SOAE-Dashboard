    text: 'Quiet hours respected: no notifications midnight–8am in user''s timezone'
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_TEMPLATES_AND_NOTIFICATIONS.016
    text: Notification delivery rate and open rate monitored per campaign
  - id: PRC.EMAIL_AND_NOTIFICATION_INFRASTRUCTURE.EMAIL_TEMPLATES_AND_NOTIFICATIONS.017
