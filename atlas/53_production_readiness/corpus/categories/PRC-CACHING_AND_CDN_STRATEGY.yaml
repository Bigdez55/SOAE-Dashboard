- id: PRC.CACHING_AND_CDN_STRATEGY.STAMPEDE_AND_FAILURE_PROTECTION
  name: Stampede & Failure Protection
  items:
  - id: PRC.CACHING_AND_CDN_STRATEGY.STAMPEDE_AND_FAILURE_PROTECTION.001
    text: 'Cache stampede prevention: request coalescing or single-flight'
  - id: PRC.CACHING_AND_CDN_STRATEGY.STAMPEDE_AND_FAILURE_PROTECTION.002
    text: Probabilistic early expiration to avoid synchronized expiry
  - id: PRC.CACHING_AND_CDN_STRATEGY.STAMPEDE_AND_FAILURE_PROTECTION.003
    text: Mutex or lock on cache miss to prevent thundering herd
