sections:
- id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE
  name: CI/CD Pipeline
  items:
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.001
    text: 'CI platform version-controlled: GitHub Actions, GitLab CI, Jenkins, or CircleCI'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.002
    text: 'Pipeline stages: lint → type-check → unit tests → build → security scan → integration tests → deploy'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.003
    text: 'Parallel job execution: independent stages run concurrently to minimize time'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.004
    text: 'Build cache configured: dependencies cached between pipeline runs'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.005
    text: Test results in structured format (JUnit XML) parsed by CI platform
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.006
    text: Test coverage reported and threshold enforced in CI
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.007
    text: Failed test details visible in PR without navigating into CI system
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.008
    text: Staging auto-deploy on merge to main branch
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.009
    text: Production deploy requires manual approval gate
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.010
    text: Deployment notification to Slack/Teams on success and failure
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.011
    text: 'Rollback: single command deploys previous release in < 5 minutes'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.012
    text: DB migrations run as separate step before app rollout with rollback support
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.013
    text: 'Smoke tests run post-deploy: 3–5 critical endpoint checks'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.014
    text: Synthetic monitor triggered post-deploy to verify critical user flows
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.015
    text: Pipeline secrets via OIDC/workload identity; no long-lived static tokens
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.016
    text: Third-party actions/orbs pinned to full commit SHA
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.017
    text: 'Pipeline execution time target: < 10 minutes for primary fast feedback path'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.018
    text: E2E and load tests run asynchronously as separate pipeline jobs
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CI_CD_PIPELINE.019
    text: Pipeline success rate and duration trend tracked and visible
- id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES
  name: Container & Kubernetes
  items:
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.001
    text: 'Dockerfile uses multi-stage build: separate builder and runtime stages'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.002
    text: 'Final image: distroless or minimal base; no shell in production where possible'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.003
    text: Non-root user in Dockerfile (USER directive)
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.004
    text: No dev tools, test files, or secrets in production image
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.005
    text: 'Image vulnerability scanning: Trivy in CI; fails on CRITICAL CVE'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.006
    text: 'Container registry with image scanning: ECR, GCR, or ACR'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.007
    text: Helm chart or Kustomize for all Kubernetes manifests
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.008
    text: Resource requests and limits set on every container
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.009
    text: HPA on all production Deployments with appropriate triggers
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.010
    text: 'PodDisruptionBudget defined: minAvailable > 0 for all critical services'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.011
    text: Readiness, liveness, and startup probes configured
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.012
    text: 'Rolling update: maxUnavailable: 0 for critical services'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.013
    text: 'Pod security context: runAsNonRoot, readOnlyRootFilesystem, drop ALL capabilities'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.014
    text: 'Network policies: default-deny per namespace; explicit allow rules'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.015
    text: 'Kubernetes RBAC: unique service account per Deployment with minimal permissions'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.016
    text: Secrets via Secrets Store CSI Driver from Vault; not Kubernetes Secrets plaintext
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.017
    text: Cluster autoscaler or Karpenter configured
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.018
    text: Ingress controller with TLS termination and cert-manager
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.019
    text: Kubernetes API server audit logging centralized
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.020
    text: etcd backed up daily; restore tested
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.CONTAINER_AND_KUBERNETES.021
    text: 'K8s version: stay within N-1 of latest stable'
- id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK
  name: Observability Stack
  items:
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.001
    text: 'Metrics: Prometheus + Grafana, Datadog, or Dynatrace'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.002
    text: 'Four golden signals dashboarded per service: latency, traffic, errors, saturation'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.003
    text: 'Infrastructure metrics: CPU, memory, disk, network per instance'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.004
    text: 'Business metrics: orders, signups, revenue dashboarded'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.005
    text: 'Logs: ELK, Loki+Grafana, Datadog Logs, or Splunk'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.006
    text: All services send structured JSON logs to aggregation platform
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.007
    text: 'Distributed tracing: Jaeger, Tempo, Zipkin, or Datadog APM'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.008
    text: OpenTelemetry SDK used for metrics, logs, and traces (vendor-agnostic)
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.009
    text: 'Trace sampling: 100% for errors, 10% for normal traffic'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.010
    text: 'Alertmanager or PagerDuty routing: P1 pages immediately, P2 in 5 minutes'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.011
    text: Every alert has a runbook link
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.012
    text: 'SLO-based alerting: error budget burn rate, not raw error rate'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.013
    text: 'Synthetic monitoring: Datadog Synthetics, Grafana Synthetic, or Checkly'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.014
    text: 'Status page: Statuspage.io or Atlassian Statuspage'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.015
    text: 'Dashboards as code: Grafana dashboards in version control'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.016
    text: 'Log retention: hot 7d, warm 30d, cold 1yr minimum'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.017
    text: 'On-call rotation defined: every production service covered 24/7'
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.018
    text: On-call handbook with runbooks for all P1/P2 scenarios
  - id: PRC.INFRASTRUCTURE_AND_DEVOPS.OBSERVABILITY_STACK.019
    text: Toil tracked; quarterly toil reduction goal set by SRE team
