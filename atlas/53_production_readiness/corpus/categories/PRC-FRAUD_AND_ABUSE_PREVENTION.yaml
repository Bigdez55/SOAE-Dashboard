  - id: PRC.FRAUD_AND_ABUSE_PREVENTION.ACCOUNT_TAKEOVER_AND_CREDENTIAL_ATTACKS.012
    text: Dark-web monitoring for leaked customer credentials
- id: PRC.FRAUD_AND_ABUSE_PREVENTION.BOT_AND_AUTOMATION_DEFENSE
