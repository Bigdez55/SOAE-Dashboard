    text: Headless browser and automation framework detection
  - id: PRC.FRAUD_AND_ABUSE_PREVENTION.BOT_AND_AUTOMATION_DEFENSE.005
    text: Device fingerprinting for risk scoring (privacy-compliant)
  - id: PRC.FRAUD_AND_ABUSE_PREVENTION.BOT_AND_AUTOMATION_DEFENSE.006
    text: Rate limiting and challenge escalation for suspicious clients
  - id: PRC.FRAUD_AND_ABUSE_PREVENTION.BOT_AND_AUTOMATION_DEFENSE.007
    text: Honeypot fields and traps for naive bots
  - id: PRC.FRAUD_AND_ABUSE_PREVENTION.BOT_AND_AUTOMATION_DEFENSE.008
