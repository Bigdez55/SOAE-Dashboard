    text: Shadow mode for new rules before enforcement
  - id: PRC.FRAUD_AND_ABUSE_PREVENTION.VELOCITY_ANOMALY_AND_RISK_SCORING.011
    text: Risk decisions logged for audit and dispute resolution
  - id: PRC.FRAUD_AND_ABUSE_PREVENTION.VELOCITY_ANOMALY_AND_RISK_SCORING.012
    text: Chargeback and fraud-confirmation data fed into risk scoring
