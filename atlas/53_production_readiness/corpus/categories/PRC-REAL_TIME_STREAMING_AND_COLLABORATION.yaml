    text: Automatic reconnection with exponential backoff and jitter on the client
  - id: PRC.REAL_TIME_STREAMING_AND_COLLABORATION.CONNECTION_LAYER_WEBSOCKET_SSE.005
    text: Resume / replay after reconnect avoids missed messages (sequence numbers or cursors)
  - id: PRC.REAL_TIME_STREAMING_AND_COLLABORATION.CONNECTION_LAYER_WEBSOCKET_SSE.006
    text: Graceful degradation to polling where WebSocket is blocked
