sections:
- id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS
  name: Performance Budgets & SLOs
  items:
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.001
    text: 'API latency SLOs defined: p50, p95, p99 targets per endpoint'
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.002
    text: 'Page load SLO: LCP < 2.5s, TTI < 3.5s, FCP < 1.8s'
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.003
    text: 'Mobile performance SLO: same metrics on throttled 3G connection'
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.004
    text: 'Database query SLO: p95 < 50ms for all OLTP queries'
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.005
    text: 'Background job SLO: completion within defined window for user-initiated jobs'
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.006
    text: 'Performance budgets enforced in CI: PR fails if bundle size exceeds budget'
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.007
    text: JS bundle budget < 300kb gzipped; total page < 1MB gzipped
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.008
    text: 'Performance regression detection: automated comparison to baseline'
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.009
    text: 'Performance dashboard: p50/p95/p99 latency trend visible to team'
  - id: PRC.PERFORMANCE_ENGINEERING.PERFORMANCE_BUDGETS_AND_SLOS.010
    text: 'Third-party script budget: each script < 50kb gzipped'
- id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION
  name: Profiling & Optimization
  items:
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.001
    text: 'CPU profiling: pprof, py-spy, async-profiler, or Clinic.js configured'
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.002
    text: Profiling run under realistic production-like load
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.003
    text: Hot code paths identified and documented
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.004
    text: Allocations per request measured on hot paths; minimized
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.005
    text: GC pressure measured; object pooling applied where significant
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.006
    text: DB EXPLAIN ANALYZE run on all slow queries
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.007
    text: N+1 queries eliminated (DataLoader, eager loading)
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.008
    text: 'Index effectiveness verified: query plans use indexes'
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.009
    text: 'Caching at appropriate layers: query result, computed value, HTTP'
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.010
    text: 'Response payloads trimmed: field selection, no over-fetching'
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.011
    text: Compression verified at HTTP layer
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.012
    text: 'Connection reuse: HTTP keep-alive, DB pool, Redis pool'
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.013
    text: 'Long-running tasks moved to async queue: never synchronous in request path'
  - id: PRC.PERFORMANCE_ENGINEERING.PROFILING_AND_OPTIMIZATION.014
    text: 'Pagination on all list queries: no unbounded SELECT * without LIMIT'
- id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM
  name: Load Testing & RUM
  items:
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.001
    text: 'Production traffic patterns documented: requests/sec by endpoint, time-of-day'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.002
    text: 'Peak traffic period identified: time of day, seasonal events'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.003
    text: Load test simulates realistic traffic pattern and user journeys
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.004
    text: '2x peak load test: SLOs not violated at 2x current peak'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.005
    text: '5x spike test: graceful degradation at extreme load'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.006
    text: 'Soak test at 80% peak for 24h: no memory leak or connection exhaustion'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.007
    text: 'Autoscaling tested: new instances join and handle traffic within 3 minutes'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.008
    text: 'Bottleneck identified per test: CPU, memory, DB connections, or external API'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.009
    text: Load test results inform capacity planning for next 6 months
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.010
    text: 'RUM tool configured: Datadog RUM, New Relic Browser, or SpeedCurve'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.011
    text: 'Field Web Vitals collected from real users: LCP, INP, CLS, FCP, TTFB'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.012
    text: RUM segmented by geography, browser, device type, and connection speed
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.013
    text: Core Web Vitals passing in CrUX (Chrome User Experience Report)
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.014
    text: 'Long task detection: main-thread tasks > 50ms identified and fixed'
  - id: PRC.PERFORMANCE_ENGINEERING.LOAD_TESTING_AND_RUM.015
    text: 'CDN offload ratio measured: % of requests served from CDN edge vs origin'
