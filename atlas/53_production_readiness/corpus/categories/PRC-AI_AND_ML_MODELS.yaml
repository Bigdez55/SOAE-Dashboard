- id: PRC.AI_AND_ML_MODELS.AGENTIC_AI_TOOL_USE_AND_ORCHESTRATION
  name: Agentic AI, Tool Use & Orchestration
  items:
  - id: PRC.AI_AND_ML_MODELS.AGENTIC_AI_TOOL_USE_AND_ORCHESTRATION.001
    text: Agent scope and allowed actions explicitly bounded (least privilege)
  - id: PRC.AI_AND_ML_MODELS.AGENTIC_AI_TOOL_USE_AND_ORCHESTRATION.002
    text: Tool/function definitions validated; tool outputs treated as untrusted input
