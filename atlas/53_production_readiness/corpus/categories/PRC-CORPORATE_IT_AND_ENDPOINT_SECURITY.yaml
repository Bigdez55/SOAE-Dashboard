- id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS
  name: Workforce Identity & Access
  items:
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.001
    text: Company SSO configured for all major internal tools
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.002
    text: MFA enforced for all employees and contractors
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.003
    text: Joiner, mover, leaver process documented and automated
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.004
    text: Access granted through groups/roles, never one-off direct grants
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.005
    text: Quarterly access reviews completed for all critical systems
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.006
    text: Contractor access has defined expiration date
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.007
    text: Shared accounts prohibited except documented break-glass accounts
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.008
    text: Break-glass accounts protected, monitored, and tested
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.009
    text: Privileged access requires approval and time-bound elevation
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.WORKFORCE_IDENTITY_AND_ACCESS.010
    text: Offboarding removes SSO, VPN, cloud, repo, email, device, and vendor access
- id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT
  name: Endpoint Management
  items:
