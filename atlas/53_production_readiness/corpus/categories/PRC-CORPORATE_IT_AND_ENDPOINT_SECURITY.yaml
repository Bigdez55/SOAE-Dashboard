    text: All company laptops enrolled in MDM (Jamf or Intune)
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT.002
    text: Full disk encryption enforced on all endpoints
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT.003
    text: EDR (Endpoint Detection and Response) installed and monitored
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT.004
    text: OS patch compliance enforced with defined deadlines
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT.005
    text: Local admin rights restricted on all endpoints
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT.006
    text: Screen lock timeout enforced via MDM policy
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT.007
    text: Lost device remote wipe process tested annually
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT.008
    text: Developer machines scanned for secrets and malware
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT.009
    text: Browser security policies managed for company devices
  - id: PRC.CORPORATE_IT_AND_ENDPOINT_SECURITY.ENDPOINT_MANAGEMENT.010
    text: Approved software inventory maintained
