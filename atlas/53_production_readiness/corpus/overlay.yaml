    notes: "Read-only repo discovery/audit (localAtlas git read). Write-back now exists separately — CAP_REPO_GIT_WRITEBACK + CAP_REPO_FILE_WRITE are WIRED (Integrations/Backend)."
  "CLI, SDK & Developer Platform":
    status: PARTIAL
    mcp_refs: [atlas_graph_query, atlas_skill_get, atlas_skill_list, atlas_knowledge_search, atlas_context_compile, atlas_trigger_route]
    capability_refs: [CAP_MCP_READ_TOOLS]
    notes: "6 MCP read tools are real + wired. ALL read-only; no write/execute tools. capability is PARTIAL (read only), not HAVE."
  "Security & Authentication":
    status: PARTIAL
    notes: "requireSession/requireTenant gate every mutating route + x-atlas-* header injection (proxy.ts) are wired, but no full IdP/RBAC/MFA executor. Partial executor; build a real auth provider + RBAC service to reach HAVE."
  "Multi-Tenancy & SaaS Architecture":
    status: PARTIAL
    notes: "Tenant scoping is real + wired (scopedSelect/scopedInsert + tenant_id FKs + cross-tenant isolation verified), but no tenant-provisioning/lifecycle/plan executor. Build a tenant-admin/provisioning route+service to reach HAVE."
  "Database":
    status: PARTIAL
    notes: "Durable Drizzle SQLite client + runMigrations (desktop) are wired; hosted Postgres dialect (schema.pg.ts) is NOT built so the write path is desktop-only. Build the hosted driver/migrations to reach HAVE."
