# overlay.yaml — HAND-MAINTAINED audit-metadata sidecar for the Production-Readiness Corpus.
#
# This file is the durable audit layer. build_corpus.py MERGES it onto the data
# extracted from corpus/source/dev-checklist-v2.jsx and NEVER overwrites it.
# Item text/structure is owned by the JSX (source of truth); coverage_status,
# skill_refs, and severity tuning are owned here.
#
# TWO DISTINCT AXES — never conflate them:
#
# `coverage:` = SKILL KNOWLEDGE. Do we have a skill that DESCRIBES how to satisfy
#   this category? status: FULL | PARTIAL | NONE | UNKNOWN. skill_refs = owning skills.
#
# `capability:` = EXECUTABLE CAPABILITY. Do we have a tool/MCP/plugin/command that
#   actually DOES it, WIRED (called at runtime), not just described?
#   status: HAVE | PARTIAL | MISSING | UNKNOWN.
#     HAVE    = a tool/MCP/command exists AND is probe-verified WIRED (wired_audit CALLED).
#     PARTIAL = some executor exists but not fully wired/tested.
#     MISSING = no executor exists — must be CREATED (see capabilities/registry.yaml).
#     UNKNOWN = not yet probe-assessed (treated as NOT-HAVE).
#   tool_refs / mcp_refs / command_refs name the executors; capability_refs name CAP_* ids.
#
# A skill DESCRIBES; a tool/MCP/plugin DOES. "coverage: FULL" does NOT imply
# "capability: HAVE". capability_status is set HONESTLY here and PROVEN by probes —
# the scorer/probes are the source of truth at audit time; these are the declared map.
#
# Keys under both blocks MUST match category names verbatim as they appear in the JSX.

schema_version: '1.1'
last_updated: '2026-06-01'
source: coverage map verified against 355 canonical skills (2026-05-31); capability axis added 2026-06-01

# Optional per-category default severity overrides (else build_corpus heuristic applies).
severity_overrides: {}

# EXECUTABLE-CAPABILITY axis. Default for any category omitted here is UNKNOWN (== not-HAVE),
# which is the honest default: most categories have skills (knowledge) but no proven executor.
# Only categories with a real, named, wired executor should be marked HAVE — and a probe must
# confirm it at audit time. The named ATLAS gaps are MISSING until their CAP_* is built+wired.
capability:
  # ── HAVE (5) — a real executor exists AND is probe-verified WIRED at runtime ──
  "Integrations":
    status: HAVE
    mcp_refs: [atlas_repo_commit_push]
    command_refs: ["POST /api/repos/[id]/commit"]
    capability_refs: [CAP_REPO_GIT_WRITEBACK]
    notes: "BUILT + probe-verified WIRED (probe_git_writeback → verify_git_writeback.mjs VERIFY_OK, real commit SHA). Push to GitHub from the platform: atlas_repo_commit_push MCP tool + POST /api/repos/[id]/commit; push only on push:true."
  "Backend":
    status: HAVE
    mcp_refs: [atlas_repo_file_write]
    command_refs: ["POST /api/repos/[id]/files"]
    capability_refs: [CAP_REPO_FILE_WRITE]
    notes: "BUILT + probe-verified WIRED (probe_repo_editable → verify_repo_file_write.mjs VERIFY_OK; path-confined, traversal rejected). Edit repo from app: atlas_repo_file_write MCP tool + POST /api/repos/[id]/files."
  "Documentation":
    status: HAVE
    mcp_refs: [atlas_knowledge_note_write]
    command_refs: ["POST /api/knowledge", "PUT /api/knowledge/[id]"]
    capability_refs: [CAP_KNOWLEDGE_NOTE_WRITE]
    notes: "BUILT + probe-verified WIRED (verify_knowledge_write.mjs VERIFY_OK; tenant-scoped create/update through SQLite). Knowledge wiki write: atlas_knowledge_note_write + POST/PUT /api/knowledge."
  "Rate Limiting, Quotas & Traffic Shaping":
    status: HAVE
    command_refs: ["enforceRateLimit() guard on POST/PUT /api/repos|knowledge|ingest"]
    capability_refs: [CAP_RATE_LIMIT]
    notes: "BUILT + probe-verified WIRED (probe_rate_limit_wired → verify_rate_limit.mjs VERIFY_OK; durable rate_limit_buckets row written, fixed-window counter). guards.enforceRateLimit wires the engine into the 6 mutating routes; fails open."
  "Audit Logging, Forensics & eDiscovery":
    status: HAVE
    command_refs: ["auditRequest() guard on POST/PUT /api/repos|knowledge|ingest"]
    capability_refs: [CAP_AUDIT_LOG]
    notes: "BUILT + probe-verified WIRED (probe_audit_wired → verify_audit_log.mjs VERIFY_OK; SHA-256 hash-chained row appended, prev_hash linked). guards.auditRequest wires the immutable audit engine into the 6 mutating routes."

  # ── PARTIAL (6) — some executor exists but read-only / not fully wired/tested ──
  "Repository Organization":
    status: PARTIAL
    mcp_refs: [atlas_skill_get, atlas_graph_query]
    command_refs: [/apex:repo_audit, /apex:check_path]
