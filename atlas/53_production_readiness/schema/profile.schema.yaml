# profile.schema.yaml — shape contract for project profiles and industry overlays.
#
# A profile scopes the universal corpus to a project archetype. It is carried as a
# `production_readiness_profile:` block inside an existing repo blueprint
# (platform/systems/30_repo_starter/repo_blueprints/BLUEPRINT-*.yaml). An industry
# overlay layers extra requirements on top of a base profile for a consulting domain.

schema_version: '1.0'

production_readiness_profile:        # block embedded in a BLUEPRINT-*.yaml
  required: [required_tier]          # plus EITHER in_scope_categories OR na_categories
  note: "Provide in_scope_categories for tight scoping, OR na_categories to scope by exclusion (in_scope = all corpus categories minus na_categories). At least one is required."
  fields:
    required_tier:        { type: enum, values: [bronze, silver, gold, platinum] }
    in_scope_categories:  { type: list, items: { type: string }, note: "verbatim corpus category names" }
    na_categories:        { type: list, optional: true, note: "categories explicitly out of scope for this archetype" }
    severity_overrides:   { type: map, optional: true, note: "{ category_name: severity } bumps for this archetype" }
    notes:                { type: string, optional: true }

industry_overlay:                    # profiles/industry_overlays/OVERLAY-*.yaml
  required: [overlay_id, applies_on, add_required_categories]
  fields:
    overlay_id:               { type: string, pattern: "^OVERLAY_[A-Z0-9_]+$" }
    industry:                 { type: string }
    applies_on:               { type: list, items: { type: string }, note: "base profile archetypes this can layer onto, or [*]" }
    add_required_categories:  { type: list, note: "categories this industry makes mandatory regardless of base profile" }
    severity_bumps:           { type: map, optional: true, note: "{ category_name: severity } raised for compliance reasons" }
    min_tier_override:        { type: enum, values: [bronze, silver, gold, platinum], optional: true }
    rationale:                { type: string }
