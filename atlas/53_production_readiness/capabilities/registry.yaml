# Capability Registry — the canonical list of EXECUTABLE capabilities.
#
# This is the missing "tools that execute" registry, distinct from skills.registry.yaml
# (which lists skills that DESCRIBE). A skill is knowledge; a CAP_* is a real
# tool / MCP tool / slash-command / service that DOES the thing.
#
# Maturity ladder (status): each CAP_* must climb it; HAVE is the top.
#   DESCRIBED  — only a skill exists (knowledge, no executor)
#   ROUTED     — skill wired to a slash-command (still no executor code)
#   EXECUTABLE — an MCP tool / command / service is implemented
#   WIRED      — probe-verified CALLED at runtime (wired_audit.py shows CALLED, not just DEFINED)
#   TESTED     — WIRED + has a regression test + evidence
# capability_status in the corpus is HAVE only when a CAP_* is WIRED or TESTED.
# Anything below WIRED is PARTIAL; no executor at all is MISSING.
#
# A CAP_* is verified by probe_capability_executable (probes/), which runs wired_audit.
# Status here is the DECLARED state; the probe is the source of truth at audit time.

