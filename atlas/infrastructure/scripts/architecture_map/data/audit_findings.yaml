    reconcileConnectorScope() 50% floor + empty-scope check
- id: O-auth-error-locked-body
  severity: LOW
  category: Security
  finding: authErrorResponse() (errors.ts) uses a FROZEN constant FORBIDDEN_BODY =
    JSON.stringify({error:"forbidden"}) for all 403 responses. UnauthorizedError →
    401 {"error":"unauthorized"}; ForbiddenError + any other auth error → 403 {"error":"forbidden"}
    byte-identical. The identical 403 body prevents existence-leakage probing — caller
    cannot distinguish "tenant mismatch" from "object not in your tenant." Increments
    Prometheus authFailuresTotal on every call.
  status: OBSERVED
  evidence: lib/auth/errors.ts:20-21 const FORBIDDEN_BODY + Object.freeze(); authErrorResponse()
    single serialization point for 401/403; increments authFailuresTotal metric
