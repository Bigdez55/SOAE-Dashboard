hard_constraints:
- Run git remote -v and cross-check the canonical map before every push.
- When ~/.ssh/config routes a host over a non-22 port, known_hosts MUST carry the port-qualified entry for that host and port.
- NEVER use StrictHostKeyChecking no to silence a host-key failure; add the verified key instead.
- The error "Can't assign requested address" is local TCP ephemeral-port exhaustion, not a network outage; expand the port range or cycle the link.
- The error "Host key verification failed" is a known_hosts/SSH-config problem, never an auth or network problem.
