id: SKILL_BROWSER_EXTENSION_001
name: Browser Extension Production Readiness
title: Browser Extension Production Readiness
purpose: >
  Take a Chrome-family or Firefox browser extension from working prototype to
  store-shippable, hardened production software. Operationalizes the
  "Browser Extension" Production-Readiness Corpus category (Manifest/Store/Permissions,
  Extension Security, UX/Compatibility) so manifest, permission, isolation, CSP,
  and small-viewport UX standards are satisfied with evidence before submission.
