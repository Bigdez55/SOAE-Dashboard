playbook: platform/sdlc/13_skills/active/SKILL_BROWSER_EXTENSION_001.playbook.md
ledger: platform/sdlc/13_skills/skill_refinery/correction_ledgers/SKILL_BROWSER_EXTENSION_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
- claude
- codex
- gemini
corpus_category: Browser Extension

trigger_conditions:
- The user is building, auditing, or shipping a browser extension (Chrome, Edge, Brave, Firefox, or any WebExtension).
- A manifest.json, content script, background service worker, popup, or options page is being created or reviewed.
- The user asks whether an extension is ready for the Chrome Web Store, Edge Add-ons, or Firefox AMO.
- Extension permissions, host_permissions, or Content Security Policy are being defined or changed.
- A store submission, rejection, or review-policy question for an extension comes up.
- Content-script-to-page isolation, message passing, or cross-origin data handling in an extension is in scope.
- The user reports extension breakage across browser versions, tabs, restarts, or after session expiry.

hard_constraints:
- Manifest V3 is used for all Chrome-family extensions; manifest_version 2 is not submitted to the Chrome Web Store.
- Requested permissions are minimal and each is justified in writing; broad permissions (tabs, all_urls, webRequest) are removed unless a documented core feature requires them.
- host_permissions are restricted to the exact domains required; "<all_urls>" and "*://*/*" are forbidden unless a justified core feature needs them, and non-core access uses optional_permissions / optional_host_permissions requested at runtime.
- No secrets, API keys, tokens, or private keys are embedded in the extension bundle; the packaged ZIP/CRX is inspected and confirmed clean before submission.
- "Remote code execution is prohibited: no eval, no new Function, no remotely-hosted scripts, and no string-to-code injection; all executable code ships inside the package (MV3 requirement)."
- Content scripts run in an isolated world and never trust page globals; they do not leak extension privileges into the page's DOM or window.
- Message passing (runtime.onMessage / onConnect / window.postMessage) validates sender id, origin, and a payload schema before acting; messages from unverified senders or origins are rejected.
- Content Security Policy is configured tightly (no unsafe-eval, no unsafe-inline, no wildcard script-src); the MV3 default extension_pages CSP is kept or made stricter, never loosened.
- User data is stored at least sensitivity, scoped to what is needed, and encrypted where the platform allows; sensitive data is not written to unprotected storage.local in plaintext.
- "The background service worker is treated as ephemeral: state is persisted (storage / chrome.alarms), it handles termination and restart cleanly, and no logic assumes a long-lived background page."
- A privacy policy is linked in the store listing, and the single-purpose, name, description, icons, and screenshots meet the target store's review guidelines before submission.
- Injected UI (content UI, popup, options) fits a small viewport, is keyboard accessible, does not break or reflow the host page layout, and the user can disable or fully disconnect the extension cleanly.
- The extension handles logged-out, expired-session, and revoked-access states with clear UI, and shows an unambiguous active/inactive status.
- Versioning and a changelog are maintained per release, and a beta/test (unlisted) channel exists for pre-release validation before public rollout.

known_failure_modes:
- Over-broad permissions ("<all_urls>", tabs, webRequest) requested for convenience, triggering store rejection and user-trust warnings.
- Trusting page-context globals or unvalidated postMessage data inside a content script, enabling a malicious page to drive the extension (privilege escalation / exfiltration).
- Assuming the MV3 background service worker stays alive, so timers, in-memory caches, or open connections are silently lost on termination.
- Shipping eval / remote scripts / a loosened CSP that violates MV3 policy and causes load failure or rejection.
- Hardcoding API keys or tokens in the bundle, which are trivially extractable from the published package.
- Injected content UI that uses page-global CSS or high z-index hacks and breaks host-page layout or accessibility.
- Ignoring Firefox/WebExtension differences (background.scripts vs service_worker, browser.* vs chrome.*, AMO review) when claiming cross-browser support.
- No handling for expired sessions or revoked access, leaving the extension in a broken or silently-failing state after auth changes.

validation_tests:
- "manifest.json declares manifest_version: 3 and the permissions array contains only entries with a written justification; grep confirms no <all_urls> in host_permissions without documented core-feature sign-off."
- Static scan of the build output finds zero occurrences of eval(, new Function(, and no remote <script src> or import() of remote URLs; CSP in the manifest contains no unsafe-eval or unsafe-inline.
- Secret scan (e.g. gitleaks / trufflehog / grep for key patterns) over the packaged extension returns no API keys, tokens, or private keys.
- Message handlers are reviewed and each onMessage/onConnect/postMessage path validates sender.id, origin, and a typed payload schema before acting; a crafted message from an untrusted origin is rejected in a test.
- The extension loads and core flows work on the lowest supported Chrome/Edge version and (if claimed) the lowest supported Firefox version; matrix recorded.
- Popup, options page, and injected UI are exercised at extension-popup dimensions and pass keyboard-only navigation; host page layout is unchanged with the extension enabled.
- Killing/suspending the background service worker (chrome://serviceworker-internals or DevTools) and reopening the extension restores state from persisted storage with no errors.
- "Store-readiness check: privacy policy URL present, single-purpose statement, description/icons/screenshots conform to guidelines, version bumped, and changelog entry added."

improvement_history:
- version: 1.0.0
  date: '2026-05-31'
  reason: >
    Created to fill the "Browser Extension" zero-coverage gap (coverage_status: NONE)
    in the Production-Readiness Corpus (53_production_readiness). Operationalizes the
    hand-authored PRC-BROWSER_EXTENSION category (30 items across Manifest/Store/Permissions,
    Extension Security, and UX/Compatibility) into concrete, evidence-backed guidance for
    Manifest V3, least-privilege permissions, content-script isolation, tight CSP, ephemeral
    service-worker handling, and small-viewport accessible UX. Composes with
    SKILL_PRODUCTION_READINESS_AUDIT_001 so the category can be audited and scored.

