ledger: platform/sdlc/13_skills/skill_refinery/correction_ledgers/SKILL_NETWORK_CONNECTIVITY_DISCIPLINE_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
- claude
- codex
- gemini

trigger_conditions:
- git push/fetch/clone fails with a connectivity-looking error.
- Could not read from remote repository, Failed to connect, or Couldnt connect to server.
- Cant assign requested address on any outbound connection.
- Host key verification failed on push/fetch.
- curl or nc to an external host fails but ICMP ping to the same host succeeds.
- Any moment you are tempted to wait for the network to come back.

hard_constraints:
- Diagnose before waiting. A connectivity error is a hypothesis, not a diagnosis; triage locally first.
- ICMP ping succeeding while TCP connect fails is definitive evidence of local TCP port exhaustion, not an outage.
- Cant assign requested address equals local ephemeral-port exhaustion, never a remote problem.
- Host key verification failed equals a known_hosts or SSH-config problem, never an auth or network problem.
- NEVER set StrictHostKeyChecking no to silence a host-key failure; add the verified key with a port-qualified entry.
- When ssh config routes a host over a non-22 port, known_hosts MUST carry the port-qualified entry for that host and port.
- Verify any host key against the providers published fingerprint before appending it to known_hosts.
- Do not lower net.inet.tcp.msl expecting existing TIME_WAIT sockets to drain; Darwin pins each timer at creation. Expand the range or cycle the link.

known_failure_modes:
- Treating Cant assign requested address as a network outage and waiting (real cause is 50k+ stuck TIME_WAIT exhausting the 49152-65535 range; ping works because ICMP needs no ephemeral port).
- Lowering net.inet.tcp.msl mid-incident and expecting instant drain; existing sockets keep their original timer so the count does not drop.
- Adding a port-443 SSH fallback to ssh config without the matching port-qualified known_hosts entry, causing every push to fail host-key verification.
- Using StrictHostKeyChecking no to silence the above, which is MITM-vulnerable.
- Concluding wrong access rights or repo does not exist from the generic SSH failure when the true cause is host-key or port exhaustion.

validation_tests:
- nc -z -w3 1.1.1.1 443 succeeds, proving outbound TCP works at all.
- ssh-keygen -F the bracketed github.com port 443 host returns a line when the 443 fallback is configured.
- netstat -an grep -c TIME_WAIT stays under about 10000 in steady state.
- After fix, git ls-remote origin returns refs without error.

improvement_history:
- version: 1.0.0
  date: '2026-05-30'
  reason: >
    Promoted from the 2026-05-30 fleet-push ordeal. A routine commit-and-push
    became hours of failed pushes because two compounding LOCAL faults were
    misdiagnosed as a network outage: ~53k stuck TIME_WAIT sockets exhausted the
    macOS ephemeral port range (every TCP connect failed instantly with Cant
    assign requested address while ICMP ping still worked), and a port-443 SSH
    fallback in ssh config lacked the matching port-qualified known_hosts entry
    (Host key verification failed). Encodes the triage order so the local cause
    is found in seconds, not hours.

