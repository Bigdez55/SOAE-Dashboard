id: SKILL_NETWORK_CONNECTIVITY_DISCIPLINE_001
title: Network Connectivity Triage Discipline
version: 1.0.0
layer: infrastructure
domains:
- infrastructure
- networking
- git
- ci_cd
tier: active
status: active
source: incident_promotion
aliases:
