hard_constraints:
- For every architectural pillar named in the spec, locate three sites separately
  (on-disk artifact, instantiation site, driver) and classify with LIVE / IMPORTED-ONLY
  / DEFINED-ONLY / STUB / DEAD.
- Enumerate dead folders explicitly with full paths. Do not hide them under "scaffolding"
  or "future work".
- A `.o` file pulled into a static archive is NOT a runtime hook. A function compiled
  and linked is NOT a function called. Distinguish linked from invoked.
- If ANY pillar is DEFINED-ONLY, STUB, or DEAD, the architecture is "scaffolded, not
  realized". It is never "built", "complete", "wired", or "done".
- Every response triggered by this skill MUST end with the Dead-or-scaffolded folders
  block, filled in honestly. No fabricated counts.
- If the user has already asked are there dead folders or what's actually wired once
  in the session, the prior answer was incomplete. Re-run the protocol from step 1.
  Do not minimize.
