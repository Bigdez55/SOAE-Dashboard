id: SKILL_GTM_GROWTH_001
name: gtm-growth
title: Go-To-Market and Growth
purpose: |-
  Production-readiness discipline for the Go-To-Market & Growth domain. Ensures a
  launch has an approved positioning and messaging strategy, an instrumented AARRR
  growth-analytics stack with a documented event taxonomy, and behavior-driven
  lifecycle/retention loops tied to a measurable activation metric, with evidence,
  not just slide-deck promises.
version: 1.0.0
layer: product
domains:
  - go-to-market
  - growth
  - launch-strategy
  - growth-analytics
  - lifecycle-and-retention
  - product-analytics
tier: active
status: active
source: native
aliases:
  - gtm-growth
  - go-to-market
  - growth-readiness
  - launch-strategy
  - lifecycle-retention
corpus_category: "Go-To-Market & Growth"
playbook: SKILL_GTM_GROWTH_001.playbook.md
ledger: ../skill_refinery/correction_ledgers/SKILL_GTM_GROWTH_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
  - claude
  - codex
  - gemini
corpus_authority: platform/systems/53_production_readiness/corpus/categories/PRC-GO_TO_MARKET_AND_GROWTH.yaml
trigger_conditions:
  - Before any public launch, planning a launch tier (silent, minor, major, flagship), or shipping a landing/product page
  - When defining or approving positioning and the cross-functional messaging framework (product, sales, marketing, support)
  - When defining or changing the North Star metric or the activation (first-value-moment) metric
  - When instrumenting the AARRR funnel (acquisition, activation, retention, referral, revenue) or its event taxonomy
  - When designing onboarding, welcome sequences, or behavior-triggered lifecycle/re-engagement campaigns
  - When prioritizing the growth experiment backlog or authoring a new growth experiment
  - When reviewing churn, win/loss, cohort retention, or segment usage after launch
  - When auditing a system against the "Go-To-Market & Growth" production-readiness category
hard_constraints:
  - "Launch Strategy: A positioning statement (audience, problem, promise, proof) MUST exist and a messaging framework MUST be approved by product, sales, marketing, AND support before public launch (LAUNCH_STRATEGY.001-002)."
  - "Launch Strategy: The launch audience MUST be segmented (internal, beta, existing, new, enterprise) and a launch tier (silent, minor, major, flagship) MUST be explicitly chosen (LAUNCH_STRATEGY.003-004)."
  - "Launch Strategy: A landing/product page, demo script + demo environment, sales-enablement deck, and an objections/pricing/limitations FAQ MUST be ready before public launch (LAUNCH_STRATEGY.005-008)."
  - "Launch Strategy: A named launch owner MUST be assigned for EACH business function, the timeline MUST cover content/product/support/engineering milestones, and a launch retrospective MUST be scheduled (LAUNCH_STRATEGY.010-012)."
  - "Growth Analytics: A North Star metric MUST be agreed by product and leadership, and an activation metric (a measurable first-value moment) MUST be defined (GROWTH_ANALYTICS.001-002)."
  - "Growth Analytics: The full AARRR funnel (acquisition, activation, retention, referral, revenue) MUST be instrumented with a documented event taxonomy that uses a consistent naming convention (GROWTH_ANALYTICS.003-004)."
  - "Growth Analytics: An attribution model and UTM governance MUST be defined for all campaigns, with cohort-retention and conversion-funnel dashboards in place and drop-off reviewed weekly after launch (GROWTH_ANALYTICS.005-009)."
  - "Growth Analytics: The experiment backlog MUST be prioritized by impact/effort, every experiment MUST declare hypothesis + success metric + guardrail metric + duration, and results MUST be archived and shared across teams (GROWTH_ANALYTICS.010-012)."
  - "Lifecycle & Retention: A welcome sequence and an in-app onboarding checklist MUST guide new users to the first value moment and be tied to the activation metric (LIFECYCLE_AND_RETENTION.001-002)."
  - "Lifecycle & Retention: Lifecycle emails MUST be triggered by user behavior (not only time-based), a re-engagement campaign MUST exist for inactive users, and upgrade prompts MUST be tied to real usage limits or demonstrated value moments (LIFECYCLE_AND_RETENTION.003-005)."
  - "Lifecycle & Retention: A customer feedback loop MUST connect to roadmap planning, and churn reasons MUST be captured, categorized, and reviewed monthly (LIFECYCLE_AND_RETENTION.006-007)."
  - "Lifecycle & Retention: Win/loss analysis MUST be performed for sales-led products, usage MUST be reviewed by customer segment, retention risks MUST be surfaced to CS/account owners, and lifecycle content MUST be localized for key segments (LIFECYCLE_AND_RETENTION.008-011)."
  - "No GTM sign-off without an evidence trail: every passed item cites the approving owner, the live dashboard, or the artifact, never a verbal claim that something exists."
known_failure_modes:
  - Launching with a positioning deck that engineering wrote alone, never approved by sales, marketing, or support
  - Choosing no explicit launch tier or audience segment, so the launch motion and comms are improvised
  - Defining a North Star metric but no measurable activation (first-value) metric, so funnel health is unobservable
  - Instrumenting events with inconsistent, undocumented names, making the AARRR funnel un-analyzable
  - Building dashboards that exist but whose drop-off is never reviewed weekly, so regressions go unnoticed
  - Running experiments with no guardrail metric or declared duration, peeking and shipping on noise
  - Sending only time-based lifecycle emails instead of behavior-triggered ones, missing the activation window
  - Capturing churn reasons nowhere or never categorizing them, so retention work has no signal to act on
validation_tests:
  - Confirm a sign-off record exists showing product, sales, marketing, AND support approved the messaging framework (LAUNCH_STRATEGY.002)
  - Confirm the launch tier and audience segments are documented and a named owner exists for each business function (LAUNCH_STRATEGY.003-004, 011)
  - Confirm the activation metric is defined and queryable, and walk one user to the first-value moment to see it record (GROWTH_ANALYTICS.002)
  - Fire one event per AARRR stage and confirm each lands with the documented name and consistent convention (GROWTH_ANALYTICS.003-004)
  - Open the cohort-retention and conversion-funnel dashboards and confirm drop-off has a weekly review owner (GROWTH_ANALYTICS.007-009)
  - Inspect a backlog experiment and confirm it declares hypothesis, success metric, guardrail metric, and duration (GROWTH_ANALYTICS.011)
  - Trigger an inactivity condition on a test user and confirm a behavior-based re-engagement email fires (LIFECYCLE_AND_RETENTION.003-004)
  - Confirm churn reasons are captured and categorized, and a monthly review of them is on the calendar (LIFECYCLE_AND_RETENTION.007)
