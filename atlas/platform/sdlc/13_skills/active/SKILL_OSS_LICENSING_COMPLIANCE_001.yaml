  reason: >
    Created to fill the "Open Source & Licensing" zero-coverage gap (coverage_status
    NONE) in the Production-Readiness Corpus (53_production_readiness). Operationalizes
    all three corpus sections — Dependency License Controls (11 items), Open Source
    Project Readiness (12 items), and Package Publishing & Provenance (11 items) —
