skill_number: 1092
trigger_conditions:
- User asks "is X built", "is X wired", "does X work", "is X complete", "is the architecture
  done", "is it realized", "is it passing"
- Assistant is about to claim "complete", "wired", "working", "realized", "fully integrated",
  "all pillars active", "30K LOC wired together"
- Before writing any "build completion report", "architecture realized" summary, or
  pillar-status table
- After acceptance tests pass and the temptation is to declare the system done
- When LOC counts, file inventories, or module-import lists are being used as evidence
  of integration
hard_constraints:
- Distinguish DEFINED (file exists on disk), IMPORTED (loaded into sys.modules or
  linked into the archive), and CALLED (function actually invoked during a real run
  of the canonical entry point). Never collapse these into one number.
- Before answering any "is X built/wired/working/complete" question, run an explicit
  runtime trace of the canonical entry point. No trace = no claim.
- If a gap is found, surface it in the FIRST reply. Do not wait for the user to ask
  twice. Do not wait for the user to push back.
- '"Tests pass" is NEVER evidence of wiring. Tests can pass against stubs, mocks,
  or the entry-point-only code path while the rest of the tree is dead.'
- LOC count, file count, or directory size is NEVER evidence of integration.
