id: SKILL_FRAUD_ABUSE_PREVENTION_001
name: Fraud and Abuse Prevention
title: "Fraud & Abuse Prevention — Production-Readiness Launch Gate"
purpose: |
  Make any platform, service, or feature provably resilient to fraud and abuse
  before launch: account takeover, bots/automation, velocity/anomaly abuse,
  multi-accounting/Sybil, and scraping/data exfiltration. Converts the
  "Fraud & Abuse Prevention" Production-Readiness Corpus category (5 sections,
  60 items) into an executable, evidence-backed gate.
version: 1.0.0
layer: security
domains:
  - fraud-prevention
  - abuse-mitigation
  - trust-and-safety
  - account-security
  - bot-defense
  - production-readiness
tier: active
status: active
source: native
aliases:
  - fraud-abuse-prevention
  - fraud-prevention
  - abuse-prevention
  - anti-fraud
  - anti-abuse
  - bot-defense
playbook: platform/sdlc/13_skills/active/SKILL_FRAUD_ABUSE_PREVENTION_001.playbook.md
ledger: platform/sdlc/13_skills/skill_refinery/correction_ledgers/SKILL_FRAUD_ABUSE_PREVENTION_001.ledger.yaml
runtime_projection: true
runtime_projection_targets:
  - claude
  - codex
  - gemini
corpus_category: "Fraud & Abuse Prevention"
trigger_conditions:
  - "User builds or audits signup, login, account-recovery, checkout, payout, or referral/promo flows"
  - "User mentions fraud, abuse, account takeover, credential stuffing, bots, scraping, or spam"
  - "A public or data-rich endpoint is exposed without bot detection, velocity limits, or risk scoring"
  - "User adds promos, referrals, free trials, credits, or any value-bearing redemption"
  - "A production-readiness or launch-gate audit reaches the 'Fraud & Abuse Prevention' category"
  - "User reports a spike in fake accounts, card testing, trial abuse, scraping, or fraud rings"
  - "User designs a risk-score / rule engine, device fingerprinting, or manual review queue"
hard_constraints:
  - "Credential-stuffing and brute-force defenses are active: breached-password checks, progressive delays/lockout, and CAPTCHA challenge on the login path"
  - "Anomalous-login detection enforced: impossible-travel / geo-velocity, new-device and new-location step-up auth, and scoring of proxy/VPN/known-malicious IPs"
  - "Account-recovery and email/phone-change flows require step-up verification and are hardened against social-engineering takeover; users are notified on password change and security events"
  - "Bot and automation defense deployed (reCAPTCHA Enterprise, hCaptcha, Turnstile, or DataDome) with invisible challenges preferred; headless-browser detection and privacy-compliant device fingerprinting feed risk scoring"
  - "Velocity checks enforced server-side per identity / IP / device on signups, logins, purchases, and messages — not only at the CDN/UI; a direct API caller hits the same limits"
  - "A per-action risk score from multiple signals drives an allow / challenge / review / deny decision engine; low risk is frictionless and high risk is challenged or blocked"
  - "Risk thresholds and rules are tunable WITHOUT a code deploy, support a shadow mode before enforcement, and every change is logged with author, timestamp, and rationale"
  - "Every risk decision is logged for audit and dispute resolution; a manual review queue exists for medium-risk actions instead of silent auto-approve/auto-deny"
  - "False-positive rate is monitored so legitimate users are not over-blocked, and a feedback loop feeds confirmed fraud and chargeback data back into rules and models"
  - "Promo, referral, free-trial, and free-credit redemptions are capped and abuse-checked (self-referral, serial trials); disposable-email domains are blocked or flagged and high-abuse signups require phone verification"
  - "Multi-accounting / Sybil detection links related accounts across shared device, payment instrument, IP, and fingerprint via an identity graph; enforcement on one linked account applies to the ring"
  - "Scraping and enumeration are blocked: non-guessable IDs with authorization checks, per-account and per-IP data-access volume limits, and throttled pagination/bulk-export with tarpitting or challenge escalation for detected scrapers"
  - "API responses minimize data to what each client needs, and bulk access to sensitive fields requires elevated authorization; export/download is monitored with anomaly alerts"
  - "Bot traffic is segmented in analytics so it does not pollute metrics, a good-bot allowlist (crawlers, monitoring) is maintained, and bot-defense effectiveness is measured against known attack campaigns"
known_failure_modes:
  - "Velocity limits only at the CDN/UI, so a direct API caller bypasses every signup/login/purchase check"
  - "Bot challenge is visual-only and locks out accessibility users because no invisible/non-visual fallback was provided"
  - "Multi-accounting passes because linkage relies on a single signal (email) that attackers trivially vary"
  - "Risk decisions are made but not logged, so disputes cannot be resolved and false positives are invisible"
  - "Thresholds are hard-coded, so a live fraud spike cannot be mitigated without an emergency deploy"
  - "Sequential / guessable IDs let an attacker enumerate and scrape the dataset despite per-request auth"
  - "Auto-block with no false-positive monitoring or appeal turns a false positive into permanent account loss"
  - "New rules are enforced directly with no shadow mode, blocking real users before the rule is validated"
validation_tests:
  - "Calling the signup/login/purchase API directly (bypassing the UI/CDN) still triggers server-side per-identity/IP/device velocity limits"
  - "A simulated credential-stuffing burst triggers progressive delay/lockout plus CAPTCHA, and produces an audit-log entry"
  - "A login from a new device/location triggers step-up auth and a user security notification"
  - "Two accounts sharing device + payment instrument are linked by the identity graph despite different emails, and a ban on one applies to the ring"
  - "A promo/referral retry or self-referral attempt is capped/blocked and a serial-trial signup with a disposable email is flagged"
  - "Sequential-ID enumeration of a data-rich endpoint is blocked (non-guessable IDs + authz) and per-IP volume limits throttle the scraper"
  - "Every allow/challenge/review/deny decision writes an auditable record, and a medium-risk action is routed to the manual review queue"
  - "A new rule can be enabled in shadow mode and a threshold changed without a code deploy, with the change logged"
